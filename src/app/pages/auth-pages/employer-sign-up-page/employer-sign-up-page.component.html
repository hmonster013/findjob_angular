<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md relative">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="/assets/images/logo.png" alt="Logo" class="h-12" />
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-gray-700 mb-8">
      Đăng ký Nhà Tuyển Dụng
    </h2>

    <!-- Form -->
    <app-employer-sign-up-form
      (submitForm)="onSubmit($event)"
      (checkCreds)="checkCreds($event)"
      [serverErrors]="serverErrors">
    </app-employer-sign-up-form>

  </div>

  <!-- Loading Overlay -->
  <div *ngIf="isLoading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="text-white text-lg">Đang xử lý đăng ký...</div>
  </div>
</div>
