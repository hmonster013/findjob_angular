<div class="min-h-screen flex items-center justify-center bg-white px-4 py-12 sm:px-6 lg:px-8">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg relative transform transition-all duration-300 hover:shadow-xl sm:max-w-lg">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img
        src="/assets/images/logo.png"
        alt="Logo Nhà Tuyển Dụng"
        class="h-14 sm:h-16 transform transition-transform duration-300 hover:scale-105"
        loading="lazy"
      />
    </div>

    <!-- Title -->
    <h2 class="text-2xl sm:text-3xl font-bold text-center text-gray-900 mb-6">
      Đăng ký Nhà Tuyển Dụng
    </h2>

    <!-- Form -->
    <app-employer-sign-up-form
      (submitForm)="onSubmit($event)"
      (checkCreds)="checkCreds($event)"
      [serverErrors]="serverErrors"
    ></app-employer-sign-up-form>

    <!-- Loading Overlay -->
    <div *ngIf="isLoading" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
      <div class="bg-white p-5 rounded-lg shadow-xl flex items-center space-x-3">
        <div class="animate-spin rounded-full h-6 w-6 border-t-2 border-blue-600"></div>
        <span class="text-gray-700 text-base">Đang xử lý đăng ký...</span>
      </div>
    </div>
  </div>
</div>
