<div class="min-h-screen flex items-center justify-center bg-white px-4 py-12">
  <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md relative">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="/assets/images/logo.png" alt="Logo" class="h-12" />
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-gray-700 mb-8">
      {{ messageSuccess ? 'Đã gửi' : 'Quên mật khẩu' }}
    </h2>

    <!-- Nếu chưa gửi -->
    <div *ngIf="!messageSuccess">
      <p class="text-sm text-gray-600 text-center mb-6">
        Nếu tài khoản tồn tại, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu qua email cho bạn.
      </p>
      <app-forgot-password-form (submitForm)="onSubmit($event)"></app-forgot-password-form>
    </div>

    <!-- Nếu đã gửi -->
    <div *ngIf="messageSuccess" class="text-center">
      <div class="text-6xl text-primary mb-6">📧</div>
      <div class="bg-green-100 text-green-700 px-4 py-3 rounded mb-4">
        {{ messageSuccess }}
      </div>
      <p class="text-gray-500 text-sm">Nếu không thấy email, kiểm tra thư mục Spam.</p>
      <p class="text-gray-500 text-sm">Email gửi từ: myjob.contact00000&#64;gmail.com</p>
    </div>

  </div>

  <!-- Loading overlay -->
  <div *ngIf="isLoading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="text-white text-lg animate-pulse">Đang xử lý...</div>
  </div>
</div>
