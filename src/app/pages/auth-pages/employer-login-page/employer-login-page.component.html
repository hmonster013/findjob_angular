<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-100 to-indigo-100 px-4 py-12 sm:px-6 lg:px-8">
  <!-- Card container -->
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg relative transform transition-all duration-300 hover:shadow-xl sm:max-w-lg">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img
        src="/assets/images/logo.png"
        alt="Logo Nhà Tuyển Dụng"
        class="h-14 sm:h-16 transform transition-transform duration-300 hover:scale-105"
        loading="lazy"
      />
    </div>

    <!-- Title -->
    <h2 class="text-2xl sm:text-3xl font-bold text-center text-gray-900 mb-6">
      Đăng nhập Nhà Tuyển Dụng
    </h2>

    <!-- Form -->
    <div class="space-y-5">
      <app-employer-login-form (submitForm)="onLogin($event)"></app-employer-login-form>
    </div>

    <!-- Links -->
    <div class="flex flex-col sm:flex-row justify-between mt-6 gap-4 text-sm">
      <a
        routerLink="/quen-mat-khau"
        class="text-blue-600 hover:text-blue-800 transition-colors duration-300 flex items-center focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded"
        aria-label="Quên mật khẩu"
      >
        <i class="fas fa-key mr-2"></i>
        Quên mật khẩu?
      </a>
      <a
        routerLink="/dang-ky"
        class="text-blue-600 hover:text-blue-800 transition-colors duration-300 flex items-center focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded"
        aria-label="Đăng ký tài khoản"
      >
        <i class="fas fa-user-plus mr-2"></i>
        Đăng ký tài khoản
      </a>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div *ngIf="isLoading" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
    <div class="bg-white p-5 rounded-lg shadow-xl flex items-center space-x-3">
      <div class="animate-spin rounded-full h-6 w-6 border-t-2 border-blue-600"></div>
      <span class="text-gray-700 text-base">Đang đăng nhập...</span>
    </div>
  </div>
</div>
