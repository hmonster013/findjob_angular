<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md relative">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="/assets/images/logo.png" alt="Logo" class="h-12" />
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-gray-700 mb-4">
      Đăng nhập Ứng viên
    </h2>

    <!-- Alerts -->
    <div *ngIf="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 text-sm">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm">
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <app-job-seeker-login-form
      (submitForm)="onLogin($event)"
      (facebookLogin)="onFacebookLogin($event)"
      (googleLogin)="onGoogleLogin($event)">
    </app-job-seeker-login-form>

    <!-- Links -->
    <div class="text-center mt-6 text-sm">
      <a routerLink="/quen-mat-khau" class="text-primary hover:underline">Quên mật khẩu?</a>
      <span class="mx-2">•</span>
      <a routerLink="/dang-ky-ung-vien" class="text-primary hover:underline">Tạo tài khoản mới</a>
    </div>

  </div>

  <!-- Loading Overlay -->
  <div *ngIf="isLoading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="text-white text-lg">Đang xử lý...</div>
  </div>
</div>
