<div class="min-h-screen flex items-center justify-center bg-white px-6 py-16">
  <div class="w-full max-w-lg bg-white p-6 rounded-xl border border-gray-100 shadow-sm relative">
    <!-- Logo -->
    <div class="flex justify-center my-6">
      <img
        src="/assets/images/logo.png"
        alt="Logo Người Tìm Việc"
        class="h-14 transform transition-transform duration-300 hover:scale-105"
        loading="lazy"
      />
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-gray-800 tracking-tight my-4">
      Đăng ký Người tìm việc
    </h2>

    <!-- Error Message -->
    <div
      *ngIf="errorMessage"
      class="bg-red-100 border border-gray-200 text-red-600 px-4 py-3 rounded-lg my-4 text-base leading-5"
    >
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <div class="space-y-6">
      <app-job-seeker-sign-up-form
        [serverErrors]="serverErrors"
        (submitForm)="onRegister($event)"
        (facebookRegister)="onFacebookRegister($event)"
        (googleRegister)="onGoogleRegister($event)"
      ></app-job-seeker-sign-up-form>
    </div>

    <!-- Link login -->
    <div class="flex justify-center gap-4 mt-8 text-base">
      <a
        routerLink="/dang-nhap"
        class="text-orange-600 hover:text-orange-700 transition-colors duration-300 flex items-center focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-offset-2 rounded"
        aria-label="Đăng nhập"
      >
        <i class="fas fa-sign-in-alt mr-2 text-orange-600"></i>
        Đã có tài khoản? Đăng nhập
      </a>
    </div>
  </div>

  <!-- Loading overlay -->
  <div
    *ngIf="isLoading"
    class="fixed inset-0 bg-orange-600 bg-opacity-50 flex items-center justify-center z-50"
  >
    <div class="bg-white p-4 rounded-lg border border-gray-100 shadow-sm flex items-center space-x-3">
      <div class="animate-spin rounded-full h-6 w-6 border-t-2 border-orange-600"></div>
      <span class="text-gray-700 text-base leading-5">Đang đăng ký...</span>
    </div>
  </div>
</div>
