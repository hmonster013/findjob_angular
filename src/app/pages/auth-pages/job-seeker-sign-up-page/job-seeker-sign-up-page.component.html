<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md relative">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="/assets/images/logo.png" alt="Logo" class="h-12" />
    </div>

    <h2 class="text-2xl font-bold text-center text-gray-700 mb-4">Đăng ký Người tìm việc</h2>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="bg-red-100 text-red-700 px-4 py-3 rounded mb-4 text-sm">
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <app-job-seeker-sign-up-form
      [serverErrors]="serverErrors"
      (submitForm)="onRegister($event)"
      (facebookRegister)="onFacebookRegister($event)"
      (googleRegister)="onGoogleRegister($event)">
    </app-job-seeker-sign-up-form>

    <!-- Link login -->
    <div class="text-center mt-6 text-sm">
      <a routerLink="/dang-nhap" class="text-primary hover:underline">Đã có tài khoản? Đăng nhập</a>
    </div>
  </div>

  <!-- Loading overlay -->
  <div *ngIf="isLoading" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="text-white text-lg">Đang xử lý...</div>
  </div>
</div>
