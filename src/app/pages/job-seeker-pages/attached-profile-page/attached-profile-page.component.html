<div class="grid grid-cols-1 md:grid-cols-12 gap-6 px-4 py-6">
  <!-- Left content -->
  <div class="md:col-span-9 space-y-6">
    <div #sectionRef class="bg-white p-6 rounded-xl shadow">
      <app-personal-info-card [title]="'Thông tin cá nhân'" />
    </div>

    <div #sectionRef class="bg-white p-6 rounded-xl shadow">
      <app-general-info-card [title]="'Thông tin chung'" />
    </div>

    <div #sectionRef class="bg-white p-6 rounded-xl shadow">
      <app-cv-card [title]="'Tải CV đính kèm'" />
    </div>
  </div>

  <!-- Sidebar navigation -->
  <div class="hidden md:block md:col-span-3">
    <div class="sticky top-20">
      <div class="bg-gradient-to-r from-primary to-blue-500 text-white rounded-xl shadow p-4">
        <h2 class="text-lg font-semibold mb-4">Hồ sơ đính kèm của bạn</h2>
        <ul class="space-y-2">
          <li *ngFor="let section of sections; let i = index">
            <button
              class="w-full flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-white/10 transition text-sm"
              (click)="scrollToSection(i)"
            >
              <span>{{ section.icon }}</span>
              <span>{{ section.label }}</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
