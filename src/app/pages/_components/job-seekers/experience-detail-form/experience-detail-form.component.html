<form [formGroup]="form" id="modal-form" (ngSubmit)="onSubmit()">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="flex flex-col col-span-2">
      <label class="mb-2 font-medium">Chức danh/vị trí công việc <span class="text-red-500">*</span></label>
      <input
        formControlName="jobName"
        placeholder="VD: Kỹ sư phần mềm"
        type="text"
        class="border rounded p-2 w-full"
      />
    </div>

    <div class="flex flex-col col-span-2">
      <label class="mb-2 font-medium">Tên công ty <span class="text-red-500">*</span></label>
      <input
        formControlName="companyName"
        placeholder="Nhập tên công ty"
        type="text"
        class="border rounded p-2 w-full"
      />
    </div>

    <div class="flex flex-col">
      <label class="mb-2 font-medium">Ngày bắt đầu <span class="text-red-500">*</span></label>
      <input
        formControlName="startDate"
        type="date"
        max="{{ maxYesterday }}"
        class="border rounded p-2 w-full"
      />
    </div>

    <div class="flex flex-col">
      <label class="mb-2 font-medium">Ngày kết thúc <span class="text-red-500">*</span></label>
      <input
        formControlName="endDate"
        type="date"
        max="{{ maxToday }}"
        class="border rounded p-2 w-full"
      />
    </div>

    <div class="flex flex-col col-span-2">
      <label class="mb-2 font-medium">Mô tả thêm</label>
      <textarea
        formControlName="description"
        placeholder="Nhập nội dung mô tả tại đây"
        class="border rounded p-2 w-full h-32 resize-none"
      ></textarea>
    </div>

    <div class="flex justify-end mt-4 col-span-2">
      <button
        type="submit"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded"
      >
        Lưu
      </button>
      <button
        type="button"
        (click)="cancel()"
        class="ml-2 bg-gray-300 hover:bg-gray-400 text-black px-4 py-2 rounded"
      >
        Hủy
      </button>
    </div>
  </div>
</form>
