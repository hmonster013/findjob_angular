<div class="p-4 bg-white rounded-lg shadow-md">

  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Kinh nghiệm làm việc</h2>
    <button (click)="handleShowAdd()" class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-full">
      ➕
    </button>
  </div>

  <hr class="mb-4">

  <div *ngIf="isLoadingExperiencesDetail">
    <div class="space-y-4">
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
    </div>
  </div>

  <div *ngIf="!isLoadingExperiencesDetail && experiencesDetail.length === 0" class="text-center text-gray-500">
    Bạn chưa có kinh nghiệm làm việc nào. Hãy thêm ngay!
  </div>

  <div *ngIf="!isLoadingExperiencesDetail && experiencesDetail.length > 0" class="relative">
    <div class="border-l-2 border-blue-500 ml-4">
      <div *ngFor="let experience of experiencesDetail; let i = index" class="relative mb-8 ml-4">
        <div class="absolute -left-5 top-0 w-3 h-3 bg-blue-500 rounded-full"></div>
        <div class="p-4 bg-gray-100 rounded shadow">
          <h3 class="text-lg font-semibold">{{ experience.position }}</h3>
          <p class="text-sm text-gray-600 mt-1">{{ experience.companyName }}</p>
          <p class="text-xs text-gray-500 mt-1">
            Từ: {{ experience.startDate | date: 'MM/yyyy' }} -
            {{ experience.isCurrent ? 'Hiện tại' : (experience.endDate | date: 'MM/yyyy') }}
          </p>
          <div class="flex space-x-2 mt-2">
            <button (click)="handleShowUpdate(experience.id)" class="text-indigo-600 hover:underline text-sm">
              ✏️ Sửa
            </button>
            <button (click)="handleDelete(experience.id)" class="text-red-600 hover:underline text-sm">
              🗑️ Xóa
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <app-experience-detail-form
    *ngIf="openPopup"
    [editData]="editData"
    [handleAddOrUpdate]="handleAddOrUpdate"
  ></app-experience-detail-form>

  <div *ngIf="isFullScreenLoading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <svg class="animate-spin h-10 w-10 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
    </svg>
  </div>

</div>
