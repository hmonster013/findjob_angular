<div class="p-4 bg-white rounded-lg shadow-md">

  <h2 class="text-xl font-bold mb-4">Việc làm đã ứng tuyển</h2>

  <div *ngIf="isLoading">
    <div class="space-y-4">
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
    </div>
  </div>

  <div *ngIf="!isLoading && jobPostsApplied.length === 0" class="text-center text-gray-500">
    Bạn chưa ứng tuyển công việc nào.
  </div>

  <div *ngIf="!isLoading && jobPostsApplied.length > 0" class="space-y-6">
    <div *ngFor="let item of jobPostsApplied" class="p-4 border rounded-lg hover:shadow-md transition-all">

      <div class="flex justify-between items-center">
        <div class="flex-1">
          <h3 class="text-lg font-semibold text-blue-700">{{ item?.jobPost?.title }}</h3>
          <p class="text-sm text-gray-500 mt-1">
            {{ item?.jobPost?.companyName }}
          </p>
        </div>

        <div class="ml-4">
          <a [routerLink]="['/job-posts', item?.jobPost?.slug]" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm">
            Xem chi tiết
          </a>
        </div>
      </div>

      <div class="flex justify-between items-center mt-4">
        <div class="flex items-center space-x-2 text-sm text-gray-600">
          <span>Ứng tuyển lúc:</span>
          <span class="font-semibold">{{ formatDateDisplay(item?.createdAt) }}</span>
        </div>
        <div>
          <span class="bg-green-100 text-green-800 text-xs font-medium px-2.5 py-0.5 rounded">
            {{ item?.statusText }}
          </span>
        </div>
      </div>

    </div>
  </div>

  <!-- Pagination -->
  <div *ngIf="!isLoading && totalPages > 1" class="flex justify-center items-center space-x-2 mt-6">
    <button
      (click)="handleChangePage(page - 1)"
      [disabled]="page <= 1"
      class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300"
    >
      Trước
    </button>

    <span class="text-sm font-medium">Trang {{ page }} / {{ totalPages }}</span>

    <button
      (click)="handleChangePage(page + 1)"
      [disabled]="page >= totalPages"
      class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300"
    >
      Sau
    </button>
  </div>

</div>
