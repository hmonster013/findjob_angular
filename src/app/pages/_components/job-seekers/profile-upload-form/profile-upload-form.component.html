<form (ngSubmit)="onSubmit()" [formGroup]="form" class="space-y-4">

  <!-- Upload file -->
  <div>
    <label class="block text-sm font-medium mb-1">Chọn tệp CV của bạn <span class="text-red-500">*</span></label>
    <input type="file" (change)="onFileChange($event)" class="block w-full text-sm text-gray-500">
    <div *ngIf="fileError" class="text-red-500 text-xs mt-1">{{ fileError }}</div>
  </div>

  <!-- Title -->
  <div>
    <label class="block text-sm font-medium mb-1">Vị trí mong muốn <span class="text-red-500">*</span></label>
    <input type="text" formControlName="title" placeholder="VD: Lập trình viên Backend" class="input-class" />
  </div>

  <!-- Position -->
  <div>
    <label class="block text-sm font-medium mb-1">Cấp bậc mong muốn <span class="text-red-500">*</span></label>
    <select formControlName="position" class="input-class">
      <option *ngFor="let option of allConfig?.positionOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  </div>

  <!-- Academic Level -->
  <div>
    <label class="block text-sm font-medium mb-1">Trình độ học vấn <span class="text-red-500">*</span></label>
    <select formControlName="academicLevel" class="input-class">
      <option *ngFor="let option of allConfig?.academicLevelOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  </div>

  <!-- Experience -->
  <div>
    <label class="block text-sm font-medium mb-1">Kinh nghiệm làm việc <span class="text-red-500">*</span></label>
    <select formControlName="experience" class="input-class">
      <option *ngFor="let option of allConfig?.experienceOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  </div>

  <!-- Career -->
  <div>
    <label class="block text-sm font-medium mb-1">Nghề nghiệp <span class="text-red-500">*</span></label>
    <select formControlName="career" class="input-class">
      <option *ngFor="let option of allConfig?.careerOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  </div>

  <!-- City -->
  <div>
    <label class="block text-sm font-medium mb-1">Tỉnh/Thành phố <span class="text-red-500">*</span></label>
    <select formControlName="city" class="input-class">
      <option *ngFor="let option of allConfig?.cityOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  </div>

  <!-- Salary Min / Max -->
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium mb-1">Lương tối thiểu <span class="text-red-500">*</span></label>
      <input type="number" formControlName="salaryMin" placeholder="Nhập lương tối thiểu" class="input-class" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Lương tối đa <span class="text-red-500">*</span></label>
      <input type="number" formControlName="salaryMax" placeholder="Nhập lương tối đa" class="input-class" />
    </div>
  </div>

  <!-- Workplace type -->
  <div>
    <label class="block text-sm font-medium mb-1">Nơi làm việc <span class="text-red-500">*</span></label>
    <select formControlName="typeOfWorkplace" class="input-class">
      <option *ngFor="let option of allConfig?.typeOfWorkplaceOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  </div>

  <!-- Job type -->
  <div>
    <label class="block text-sm font-medium mb-1">Hình thức làm việc <span class="text-red-500">*</span></label>
    <select formControlName="jobType" class="input-class">
      <option *ngFor="let option of allConfig?.jobTypeOptions" [value]="option.value">{{ option.label }}</option>
    </select>
  </div>

  <!-- Description -->
  <div>
    <label class="block text-sm font-medium mb-1">Mục tiêu nghề nghiệp <span class="text-red-500">*</span></label>
    <textarea formControlName="description" rows="4" class="input-class" placeholder="Nhập nội dung tại đây"></textarea>
  </div>

  <!-- Submit -->
  <div class="flex justify-end">
    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">Lưu</button>
  </div>

</form>
