<div class="p-4 bg-white rounded-lg shadow-md">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Chứng chỉ</h2>
    <button (click)="handleShowAdd()" class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-full">
      ➕
    </button>
  </div>

  <hr class="mb-4">

  <div *ngIf="isLoadingCertificates">
    <div class="space-y-4">
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
    </div>
  </div>

  <div *ngIf="!isLoadingCertificates && certificates.length === 0" class="text-center text-gray-500">
    Bạn chưa có chứng chỉ nào. Hãy thêm để làm đẹp hồ sơ!
  </div>

  <div *ngIf="!isLoadingCertificates && certificates.length > 0" class="relative">
    <div class="border-l-2 border-blue-500 ml-4">
      <div *ngFor="let certificate of certificates; let i = index" class="relative mb-8 ml-4">
        <div class="absolute -left-5 top-0 w-3 h-3 bg-blue-500 rounded-full"></div>
        <div class="p-4 bg-gray-100 rounded shadow">
          <h3 class="text-lg font-semibold">{{ certificate.name }}</h3>
          <p class="text-sm text-gray-600 mt-1">{{ certificate.organization }}</p>
          <p class="text-xs text-gray-500 mt-1">
            Cấp ngày: {{ certificate.issuedDate | date: 'MM/yyyy' }}
          </p>
          <div class="flex space-x-2 mt-2">
            <button (click)="handleShowUpdate(certificate.id)" class="text-indigo-600 hover:underline text-sm">
              ✏️ Sửa
            </button>
            <button (click)="handleDelete(certificate.id)" class="text-red-600 hover:underline text-sm">
              🗑️ Xóa
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Popup -->
  <div
    *ngIf="openPopup"
    class="fixed inset-0 bg-gray-500/50 flex items-center justify-center z-50"
  >
    <div class="bg-white rounded-lg p-6 max-w-lg w-full relative modal-content">
      <!-- Nút đóng modal -->
      <button
        (click)="openPopup = false"
        class="absolute top-2 right-2 text-gray-500 hover:text-gray-700 close-button"
        aria-label="Đóng modal"
      >
        ✕
      </button>
      <!-- Form chỉnh sửa -->
      <app-certificate-form
        [editData]="editData"
        [handleAddOrUpdate]="handleAddOrUpdate"
        [serverErrors]="serverErrors"
      ></app-certificate-form>
    </div>
  </div>

  <!-- Fullscreen Loading -->
  <div
    *ngIf="isFullScreenLoading"
    class="fixed inset-0 bg-gray-500/50 flex items-center justify-center z-50"
  >
    <svg
      class="animate-spin h-10 w-10 text-white"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
    >
      <circle
        class="opacity-25"
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4"
      ></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
      ></path>
    </svg>
  </div>
</div>
