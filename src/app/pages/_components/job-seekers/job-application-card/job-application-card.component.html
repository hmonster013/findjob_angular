<div class="p-4 bg-white rounded-lg shadow-md">
  <!-- Header -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Hồ sơ ứng tuyển</h2>
    <button
      class="p-2 rounded-full hover:bg-blue-100 hover:text-blue-600 transition"
      (click)="navigateToProfile()"
    >
      <i class="fas fa-arrow-right"></i>
    </button>
  </div>

  <!-- Loading state -->
  <div *ngIf="isLoading" class="space-y-3">
    <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
    <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
  </div>

  <!-- Empty state -->
  <div *ngIf="!isLoading && resumes.length === 0" class="text-center text-gray-500">
    Chưa có hồ sơ ứng tuyển nào.
  </div>

  <!-- Resume list -->
  <div *ngIf="!isLoading && resumes.length > 0" class="space-y-2">
    <div
      *ngFor="let resume of resumes"
      class="flex items-center justify-between p-4 bg-gray-50 rounded-xl hover:shadow-sm hover:-translate-y-0.5 transition-all cursor-pointer"
    >
      <div class="flex items-center space-x-3">
        <!-- Avatar -->
        <div class="p-2 rounded-full"
             [ngClass]="{
               'bg-blue-100': resume?.type === 'CV_WEBSITE',
               'bg-red-100': resume?.type === 'CV_UPLOAD'
             }">
          <i *ngIf="resume?.type === 'CV_WEBSITE'" class="fas fa-file-alt text-blue-600 text-xl"></i>
          <i *ngIf="resume?.type === 'CV_UPLOAD'" class="fas fa-file-pdf text-red-600 text-xl"></i>
        </div>

        <!-- Title and description -->
        <div>
          <h3 class="text-base font-semibold">{{ resume.title }}</h3>
          <p class="text-sm text-gray-500">
            Sửa lần cuối: {{ formatDateDisplay(resume.updateAt) }}
          </p>
          <span class="text-sm font-medium"
                [ngClass]="{
                  'text-green-600': resume.isActive,
                  'text-red-600': !resume.isActive
                }">
            {{ resume.isActive ? 'Đang cho phép tìm kiếm' : 'Không cho phép tìm kiếm' }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
