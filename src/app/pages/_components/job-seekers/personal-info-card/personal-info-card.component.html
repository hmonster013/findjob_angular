<div class="p-6 bg-white rounded-lg shadow-md relative">
  <!-- Title -->
  <h2 class="text-2xl font-semibold text-gray-800 mb-4">Thông tin cá nhân</h2>
  <hr class="border-gray-500 mb-4">

  <!-- Loading Skeleton -->
  <div *ngIf="isLoadingProfile" class="space-y-3">
    <div class="h-6 bg-gray-300 rounded-md animate-pulse"></div>
    <div class="h-6 bg-gray-300 rounded-md animate-pulse"></div>
  </div>

  <!-- No Profile -->
  <div *ngIf="!isLoadingProfile && !profile" class="text-center text-gray-600 text-sm">
    Bạn chưa có thông tin cá nhân.
  </div>

  <!-- Profile Info -->
  <div *ngIf="!isLoadingProfile && profile" class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
      <div>
        <span class="font-semibold text-gray-800">Họ tên:</span> {{ profile.user.fullName }}
      </div>
      <div>
        <span class="font-semibold text-gray-800">Email:</span> {{ profile.email }}
      </div>
      <div>
        <span class="font-semibold text-gray-800">Số điện thoại:</span> {{ profile.phone }}
      </div>
      <div>
        <span class="font-semibold text-gray-800">Ngày sinh:</span> {{ profile.birthDate | date: 'dd/MM/yyyy' }}
      </div>
      <div>
        <span class="font-semibold text-gray-800">Giới tính:</span> {{ profile.genderText }}
      </div>
      <div>
        <span class="font-semibold text-gray-800">Địa chỉ:</span> {{ profile.address }}
      </div>
    </div>

    <div class="mt-6 flex justify-end">
      <button
        (click)="handleShowEdit()"
        class="px-4 py-2 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-md shadow-sm hover:bg-blue-700 text-sm font-medium transition-colors duration-200 flex items-center gap-2"
      >
        <i class="fas fa-edit"></i> Chỉnh sửa
      </button>
    </div>
  </div>

  <!-- Modal Popup -->
  <div
    *ngIf="openPopup"
    class="fixed inset-0 bg-gray-500/50 flex items-center justify-center z-50 transition-opacity duration-300"
  >
    <div class="bg-white rounded-lg p-6 max-w-md w-full relative max-h-[80vh] overflow-y-auto">
      <!-- Close Button -->
      <button
        (click)="openPopup = false"
        class="absolute top-4 right-4 text-gray-600 hover:text-gray-800 transition-colors duration-200"
        aria-label="Đóng modal"
      >
        <i class="fas fa-times"></i>
      </button>
      <!-- Form -->
      <app-personal-profile-form
        [editData]="profile"
        [handleUpdateProfile]="handleUpdate"
        [allConfig]="allConfig"
      ></app-personal-profile-form>
      <!-- Save Button -->
      <div class="flex justify-end mt-4">
        <button
          type="submit"
          form="modal-form"
          class="px-4 py-2 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-md shadow-sm hover:bg-blue-700 text-sm font-medium transition-colors duration-200 flex items-center gap-2"
        >
          <i class="fas fa-save"></i> Lưu
        </button>
      </div>
    </div>
  </div>

  <!-- Fullscreen Loading -->
  <div
    *ngIf="isFullScreenLoading"
    class="fixed inset-0 bg-gray-500/50 flex items-center justify-center z-50"
  >
    <div class="animate-spin rounded-full h-10 w-10 border-2 border-blue-600 border-t-transparent shadow-sm"></div>
  </div>
</div>
