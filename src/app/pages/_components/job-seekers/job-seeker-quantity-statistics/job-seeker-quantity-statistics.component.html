<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

  <div class="bg-green-100 rounded-xl p-4 shadow-sm flex flex-col items-center">
    <div class="text-green-600 text-4xl mb-2">📄</div>
    <div class="text-gray-700 font-semibold text-lg">Việc làm đã ứng tuyển</div>
    <div class="text-green-600 font-bold text-3xl mt-2">
      {{ isLoading ? '...' : (data?.totalApply ?? 0) }}
    </div>
  </div>

  <div class="bg-blue-100 rounded-xl p-4 shadow-sm flex flex-col items-center">
    <div class="text-blue-600 text-4xl mb-2">📚</div>
    <div class="text-gray-700 font-semibold text-lg">Việc làm đã lưu</div>
    <div class="text-blue-600 font-bold text-3xl mt-2">
      {{ isLoading ? '...' : (data?.totalSave ?? 0) }}
    </div>
  </div>

  <div class="bg-cyan-100 rounded-xl p-4 shadow-sm flex flex-col items-center">
    <div class="text-cyan-600 text-4xl mb-2">👀</div>
    <div class="text-gray-700 font-semibold text-lg">NTD đã xem hồ sơ</div>
    <div class="text-cyan-600 font-bold text-3xl mt-2">
      {{ isLoading ? '...' : (data?.totalView ?? 0) }}
    </div>
  </div>

  <div class="bg-pink-100 rounded-xl p-4 shadow-sm flex flex-col items-center">
    <div class="text-pink-600 text-4xl mb-2">❤️</div>
    <div class="text-gray-700 font-semibold text-lg">NTD đang theo dõi</div>
    <div class="text-pink-600 font-bold text-3xl mt-2">
      {{ isLoading ? '...' : (data?.totalFollow ?? 0) }}
    </div>
  </div>

</div>
