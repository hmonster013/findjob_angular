<form [formGroup]="form" id="modal-form" (ngSubmit)="onSubmit()">
  <div class="grid grid-cols-1 gap-4">

    <div class="flex flex-col">
      <label class="mb-2 font-medium">
        Ngôn ngữ <span class="text-red-500">*</span>
      </label>
      <select formControlName="language" class="border rounded p-2 w-full">
        <option value="">Chọn ngôn ngữ</option>
        <option *ngFor="let option of allConfig?.languageOptions" [value]="option.value">{{ option.label }}</option>
      </select>
      <div *ngIf="form.get('language')?.errors?.['serverError']" class="text-red-500 text-sm mt-1">
        {{ form.get('language')?.errors?.['serverError'] }}
      </div>
    </div>

    <div class="flex flex-col">
      <label class="mb-2 font-medium">
        Trình độ <span class="text-red-500">*</span>
      </label>
      <div class="flex space-x-2">
        <ng-container *ngFor="let star of [1, 2, 3, 4, 5]">
          <input
            type="radio"
            [value]="star"
            formControlName="level"
            class="hidden"
            [id]="'star-' + star"
          />
          <label
            [for]="'star-' + star"
            class="text-yellow-400 text-2xl cursor-pointer select-none"
          >★</label>
        </ng-container>
      </div>
      <div *ngIf="form.get('level')?.errors?.['serverError']" class="text-red-500 text-sm mt-1">
        {{ form.get('level')?.errors?.['serverError'] }}
      </div>
    </div>

  </div>
</form>
