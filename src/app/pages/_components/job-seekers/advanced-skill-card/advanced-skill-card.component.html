<div class="p-4 bg-white rounded-lg shadow-md">

  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Kỹ năng chuyên môn</h2>
    <button (click)="handleShowAdd()" class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-full">
      ➕
    </button>
  </div>

  <hr class="mb-4">

  <div *ngIf="isLoadingAdvancedSkills">
    <div class="space-y-4">
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
    </div>
  </div>

  <div *ngIf="!isLoadingAdvancedSkills && advancedSkills.length === 0" class="text-center text-gray-500">
    Bạn chưa có kỹ năng nào. Hãy thêm kỹ năng để làm hồ sơ nổi bật hơn.
  </div>

  <table *ngIf="!isLoadingAdvancedSkills && advancedSkills.length > 0" class="table-auto w-full">
    <thead>
      <tr class="bg-gray-100">
        <th class="p-2 text-left">Tên kỹ năng</th>
        <th class="p-2 text-left">Trình độ</th>
        <th class="p-2 text-right">Hành động</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let skill of advancedSkills" class="hover:bg-gray-50">
        <td class="p-2">{{ skill.name }}</td>
        <td class="p-2">
          <div class="flex space-x-1">
            <ng-container *ngFor="let star of [1,2,3,4,5]">
              <span [class.text-yellow-400]="star <= (skill.level || 0)" [class.text-gray-300]="star > (skill.level || 0)">★</span>
            </ng-container>
          </div>
        </td>
        <td class="p-2 text-right">
          <button (click)="handleShowUpdate(skill.id)" class="text-indigo-600 hover:underline mr-2">
            ✏️
          </button>
          <button (click)="handleDelete(skill.id)" class="text-red-600 hover:underline">
            🗑️
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <app-advanced-skill-form
    *ngIf="openPopup"
    [editData]="editData"
    [handleAddOrUpdate]="handleAddOrUpdate"
    [serverErrors]="serverErrors"
  ></app-advanced-skill-form>

  <div *ngIf="isFullScreenLoading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <svg class="animate-spin h-10 w-10 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
    </svg>
  </div>

</div>
