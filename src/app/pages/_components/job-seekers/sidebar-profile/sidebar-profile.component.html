<div class="p-4">
  <div class="flex items-center space-x-4">
    <div
      class="relative w-24 h-24 p-1 rounded-full bg-gradient-to-br from-purple-700 to-purple-400 shadow-lg hover:opacity-90"
    >
      <img
        [src]="currentUser?.avatarUrl"
        alt="Avatar"
        class="rounded-full w-full h-full object-cover border-2 border-white"
      />
    </div>
    <div class="flex-1">
      <p class="text-xs text-gray-600">Chào mừng trở lại,</p>
      <h2 class="text-lg font-semibold text-gray-800 mb-2">{{ currentUser?.fullName }}</h2>

      <div *ngIf="currentUser?.isVerifyEmail; else notVerified" class="flex items-center text-green-600 text-sm">
        <span class="mr-1">✔️</span>
        <span>Tài khoản đã xác thực</span>
      </div>
      <ng-template #notVerified>
        <div class="flex items-center text-red-600 text-sm">
          <span class="mr-1">❌</span>
          <span>Tài khoản chưa xác thực</span>
        </div>
      </ng-template>
    </div>
  </div>
</div>
