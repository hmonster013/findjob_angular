<div class="p-4 bg-white rounded-lg shadow-md">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Kỹ năng ngôn ngữ</h2>
    <button (click)="handleShowAdd()" class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-full">
      ➕
    </button>
  </div>

  <hr class="mb-4">

  <div *ngIf="isLoadingLanguageSkills">
    <div class="space-y-4">
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
    </div>
  </div>

  <div *ngIf="!isLoadingLanguageSkills && languageSkills.length === 0" class="text-center text-gray-500">
    Bạn chưa có kỹ năng ngôn ngữ nào.
  </div>

  <div *ngIf="!isLoadingLanguageSkills && languageSkills.length > 0" class="overflow-x-auto">
    <table class="min-w-full text-sm text-left text-gray-500">
      <thead class="text-xs text-gray-700 uppercase bg-gray-100">
        <tr>
          <th class="px-6 py-3">Tên ngôn ngữ</th>
          <th class="px-6 py-3">Kỹ năng nghe</th>
          <th class="px-6 py-3">Kỹ năng nói</th>
          <th class="px-6 py-3">Kỹ năng đọc</th>
          <th class="px-6 py-3">Kỹ năng viết</th>
          <th class="px-6 py-3">Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let skill of languageSkills" class="bg-white border-b">
          <td class="px-6 py-4 font-medium text-gray-900">{{ skill.languageName }}</td>
          <td class="px-6 py-4">{{ skill.listeningSkill }}/5</td>
          <td class="px-6 py-4">{{ skill.speakingSkill }}/5</td>
          <td class="px-6 py-4">{{ skill.readingSkill }}/5</td>
          <td class="px-6 py-4">{{ skill.writingSkill }}/5</td>
          <td class="px-6 py-4 flex space-x-2">
            <button (click)="handleShowUpdate(skill.id)" class="text-indigo-600 hover:underline text-sm">
              ✏️
            </button>
            <button (click)="handleDelete(skill.id)" class="text-red-600 hover:underline text-sm">
              🗑️
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Popup -->
  <div
    *ngIf="openPopup"
    class="fixed inset-0 bg-gray-500/50 flex items-center justify-center z-50"
  >
    <div class="bg-white rounded-lg p-6 max-w-lg w-full relative modal-content">
      <!-- Nút đóng modal -->
      <button
        (click)="openPopup = false"
        class="absolute top-2 right-2 text-gray-500 hover:text-gray-700 close-button"
        aria-label="Đóng modal"
      >
        ✕
      </button>
      <!-- Form chỉnh sửa -->
      <app-language-skill-form
        [editData]="editData"
        [handleAddOrUpdate]="handleAddOrUpdate"
        [allConfig]="allConfig"
      ></app-language-skill-form>
    </div>
  </div>

  <!-- Fullscreen Loading -->
  <div
    *ngIf="isFullScreenLoading"
    class="fixed inset-0 bg-gray-500/50 flex items-center justify-center z-50"
  >
    <svg
      class="animate-spin h-10 w-10 text-white"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
    >
      <circle
        class="opacity-25"
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4"
      ></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
      ></path>
    </svg>
  </div>
</div>
