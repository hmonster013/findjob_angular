<div class="p-4 bg-white rounded-lg shadow-md">

  <h2 class="text-xl font-bold mb-4">Công ty bạn theo dõi</h2>

  <div *ngIf="isLoading">
    <div class="space-y-4">
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
      <div class="h-5 bg-gray-200 rounded animate-pulse"></div>
    </div>
  </div>

  <div *ngIf="!isLoading && companiesFollowed.length === 0" class="text-center text-gray-500">
    Bạn chưa theo dõi công ty nào.
  </div>

  <div *ngIf="!isLoading && companiesFollowed.length > 0" class="space-y-4">

    <div *ngFor="let company of companiesFollowed" class="p-4 border rounded hover:shadow transition">

      <div class="flex justify-between items-center">
        <div>
          <h3 class="text-lg font-semibold text-blue-700">{{ company?.company?.name }}</h3>
          <p class="text-sm text-gray-500 mt-1">
            {{ company?.company?.address }}
          </p>
        </div>

        <button
          (click)="handleUnfollow(company?.company?.slug)"
          class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm"
        >
          Hủy theo dõi
        </button>
      </div>

    </div>

  </div>

  <!-- Pagination -->
  <div *ngIf="!isLoading && totalPages > 1" class="flex justify-center items-center space-x-2 mt-6">
    <button
      (click)="handleChangePage(page - 1)"
      [disabled]="page <= 1"
      class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300"
    >
      Trước
    </button>

    <span class="text-sm font-medium">Trang {{ page }} / {{ totalPages }}</span>

    <button
      (click)="handleChangePage(page + 1)"
      [disabled]="page >= totalPages"
      class="px-3 py-1 rounded bg-gray-200 hover:bg-gray-300"
    >
      Sau
    </button>
  </div>

</div>
