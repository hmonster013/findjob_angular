<form [formGroup]="settingForm" (ngSubmit)="onSubmit()" id="setting-form" class="space-y-2">
  <!-- Email Notification -->
  <div class="flex items-center gap-2">
    <input type="checkbox" formControlName="emailNotificationActive"
      class="w-4 h-4 border-gray-300 rounded shadow-sm focus:ring-2 focus:ring-blue-500 text-blue-600 transition-colors duration-200" />
    <label class="text-sm font-medium text-gray-800">Cho phép gửi email</label>
  </div>

  <!-- SMS Notification -->
  <div class="flex items-center gap-2">
    <input type="checkbox" formControlName="smsNotificationActive"
      class="w-4 h-4 border-gray-300 rounded shadow-sm focus:ring-2 focus:ring-blue-500 text-blue-600 transition-colors duration-200" />
    <label class="text-sm font-medium text-gray-800">Cho phép gửi tin nhắn SMS</label>
  </div>
</form>
