<div class="card-container">
  <!-- Title -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="card-title">{{ title }}</h2>
  </div>

  <!-- Divider -->
  <hr class="divider">

  <!-- Loading Skeleton -->
  <div *ngIf="isLoadingSettings" class="space-y-4">
    <div class="skeleton-checkbox"></div>
    <div class="skeleton-checkbox"></div>
    <div class="flex justify-center mt-4">
      <div class="skeleton-button"></div>
    </div>
  </div>

  <!-- Settings Form -->
  <div *ngIf="!isLoadingSettings">
    <app-setting-form
      [editData]="editData"
      (update)="handleUpdateUserSetting($event)"
    ></app-setting-form>

    <div class="flex justify-center mt-6">
      <button
        type="submit"
        form="setting-form"
        class="submit-button"
        [disabled]="isSubmitting"
      >
        <i *ngIf="!isSubmitting" class="fas fa-save"></i>
        <span *ngIf="!isSubmitting">Cập nhật</span>
        <span *ngIf="isSubmitting" class="spinner"></span>
        <span *ngIf="isSubmitting">Đang cập nhật...</span>
      </button>
    </div>
  </div>
</div>
