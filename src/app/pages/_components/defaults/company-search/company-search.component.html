<div class="bg-purple-800 p-4 rounded-lg w-full">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center">
    <!-- Input Search -->
    <div class="col-span-1 md:col-span-7">
      <input
        formControlName="kw"
        type="text"
        placeholder="Nhập tên công ty hoặc lĩnh vực cần tìm kiếm"
        class="w-full p-2 rounded-md border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none transition-all"
      />
    </div>

    <!-- Select City -->
    <div class="col-span-1 md:col-span-3">
      <select
        formControlName="cityId"
        class="w-full p-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none transition-all"
      >
        <option value="">Tất cả tỉnh thành</option>
        <option *ngFor="let city of cityOptions" [value]="city.id">
          {{ city.name }}
        </option>
      </select>
    </div>

    <!-- Buttons -->
    <div class="col-span-1 md:col-span-2 flex gap-2 justify-end">
      <button
        type="submit"
        class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-all"
      >
        Tìm kiếm
      </button>
      <button
        type="button"
        (click)="onReset()"
        class="bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600 transition-all"
      >
        Xóa
      </button>
    </div>
  </form>
</div>
