<div class="home-search-container max-w-[1280px] mx-auto p-4 bg-white rounded-lg shadow-md">
  <form (ngSubmit)="onSearch()" class="flex flex-col sm:flex-row gap-4">
    <!-- Input cho tên công việc -->
    <div class="w-full sm:w-1/3">
      <label for="keyword" class="block text-sm font-medium text-gray-700 mb-1">Tên công việc</label>
      <input
        id="keyword"
        [(ngModel)]="keyword"
        name="keyword"
        type="text"
        placeholder="Nhập tên công việc (VD: Lập trình viên)"
        class="w-full h-10 px-4 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    <!-- Dropdown cho Careers -->
    <div class="w-full sm:w-1/3">
      <label for="career" class="block text-sm font-medium text-gray-700 mb-1">Ngành nghề</label>
      <select
        id="career"
        [(ngModel)]="selectedCareer"
        name="career"
        class="w-full h-10 px-4 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
      >
        <option value="">Chọn ngành nghề</option>
        <option *ngFor="let career of careers" [value]="career.id">
          {{ career.name }}
        </option>
      </select>
    </div>

    <!-- Dropdown cho Cities -->
    <div class="w-full sm:w-1/3">
      <label for="city" class="block text-sm font-medium text-gray-700 mb-1">Thành phố</label>
      <select
        id="city"
        [(ngModel)]="selectedCity"
        name="city"
        class="w-full h-10 px-4 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
      >
        <option value="">Chọn thành phố</option>
        <option *ngFor="let city of cities" [value]="city.id">
          {{ city.name }}
        </option>
      </select>
    </div>

    <!-- Nút tìm kiếm -->
    <div class="w-full sm:w-35">
      <label class="block text-sm font-medium text-gray-700 mb-1 invisible">Tìm kiếm</label>
      <button
        type="submit"
        class="w-full sm:w-auto h-10 px-6 bg-[#441DA0] text-white font-semibold rounded-md hover:bg-[#3a1785] transition-colors shadow-sm hover:shadow-md"
      >
        Tìm kiếm
      </button>
    </div>
  </form>
</div>
