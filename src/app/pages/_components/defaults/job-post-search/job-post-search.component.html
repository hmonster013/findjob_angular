<div class="bg-white p-6 rounded-xl shadow-sm">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-wrap gap-4 items-center">
    <!-- Keyword Search -->
    <div class="flex-1 min-w-[300px]">
      <div class="relative">
        <input
          type="text"
          formControlName="kw"
          placeholder="Tìm kiếm cơ hội việc làm"
          class="w-full pl-10 pr-4 py-3 rounded-full border border-gray-200 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all hover:shadow-md"
        />
        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-orange-600 text-lg"></i>
      </div>
    </div>

    <!-- Career -->
    <div class="w-44">
      <select
        formControlName="careerId"
        class="w-full px-3 py-3 rounded-lg border border-gray-200 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all"
      >
        <option value="">Tất cả ngành nghề</option>
        <option *ngFor="let item of careerOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- City -->
    <div class="w-44">
      <select
        formControlName="cityId"
        class="w-full px-3 py-3 rounded-lg border border-gray-200 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all"
      >
        <option value="">Tất cả tỉnh thành</option>
        <option *ngFor="let item of cityOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 items-center">
      <button
        type="submit"
        class="bg-gradient-to-r from-orange-500 to-orange-600 text-white px-5 py-3 rounded-lg hover:bg-orange-700 transition-all duration-300"
      >
        Tìm kiếm
      </button>
      <button
        type="button"
        (click)="toggleAdvanceFilter()"
        class="bg-gradient-to-r from-orange-500 to-orange-600 text-white px-5 py-3 rounded-lg hover:bg-orange-700 transition-all duration-300"
      >
        {{ showAdvanceFilter ? 'Ẩn lọc nâng cao' : 'Lọc nâng cao' }}
      </button>
      <button
        *ngIf="isFormNotEmpty()"
        type="button"
        (click)="onReset()"
        class="text-orange-600 hover:text-orange-700 p-2 transition-all"
      >
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>
  </form>
</div>

<!-- Advanced Filter -->
<div *ngIf="showAdvanceFilter" class="bg-white p-6 rounded-xl mt-4 border border-gray-100 shadow-sm">
  <div class="flex flex-wrap gap-4 items-center">
    <!-- Title "Lọc nâng cao" -->
    <h3 class="text-base font-semibold text-orange-600 bg-orange-100 px-4 py-2 rounded-lg">
      Lọc nâng cao
    </h3>

    <!-- Position -->
    <div class="w-44">
      <select
        formControlName="positionId"
        class="w-full px-3 py-3 rounded-lg border border-gray-200 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all"
      >
        <option value="">Tất cả vị trí</option>
        <option *ngFor="let item of positionOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Experience -->
    <div class="w-44">
      <select
        formControlName="experienceId"
        class="w-full px-3 py-3 rounded-lg border border-gray-200 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all"
      >
        <option value="">Tất cả kinh nghiệm</option>
        <option *ngFor="let item of experienceOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Job Type -->
    <div class="w-44">
      <select
        formControlName="jobTypeId"
        class="w-full px-3 py-3 rounded-lg border border-gray-200 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all"
      >
        <option value="">Tất cả hình thức</option>
        <option *ngFor="let item of jobTypeOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Type of Workplace -->
    <div class="w-44">
      <select
        formControlName="typeOfWorkplaceId"
        class="w-full px-3 py-3 rounded-lg border border-gray-200 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all"
      >
        <option value="">Tất cả loại hình làm việc</option>
        <option *ngFor="let item of typeOfWorkplaceOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Gender -->
    <div class="w-44">
      <select
        formControlName="genderId"
        class="w-full px-3 py-3 rounded-lg border border-gray-200 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all"
      >
        <option value="">Tất cả giới tính</option>
        <option *ngFor="let item of genderOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Reset Button -->
    <button
      type="button"
      (click)="onReset()"
      class="bg-gradient-to-r from-orange-500 to-orange-600 text-white px-4 py-3 rounded-lg hover:bg-orange-700 transition-all duration-300 flex items-center gap-2"
    >
      <i class="fas fa-trash text-lg"></i>
      Xoá
    </button>
  </div>
</div>
