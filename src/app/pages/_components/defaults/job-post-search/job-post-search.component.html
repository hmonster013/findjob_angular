<div class="bg-purple-800 p-4 rounded-lg border border-purple-900">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-wrap gap-2 items-center">
    <!-- Keyword Search -->
    <div class="flex-1 min-w-[400px]">
      <div class="relative">
        <input
          type="text"
          formControlName="kw"
          placeholder="Tìm kiếm cơ hội việc làm"
          class="w-full pl-10 pr-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 placeholder-gray-400 focus:outline-none transition-all"
        />
        <svg
          class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
    </div>

    <!-- Career -->
    <div class="w-40">
      <select
        formControlName="careerId"
        class="w-full px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none transition-all"
      >
        <option value="">Tất cả ngành nghề</option>
        <option *ngFor="let item of careerOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- City -->
    <div class="w-40">
      <select
        formControlName="cityId"
        class="w-full px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none transition-all"
      >
        <option value="">Tất cả tỉnh thành</option>
        <option *ngFor="let item of cityOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Buttons -->
    <div class="flex gap-2">
      <button
        type="submit"
        class="bg-blue-500 text-white px-4 py-2 rounded-md"
      >
        Tìm kiếm
      </button>
      <button
        type="button"
        (click)="toggleAdvanceFilter()"
        class="bg-orange-500 text-white px-4 py-2 rounded-md"
      >
        {{ showAdvanceFilter ? 'Ẩn lọc nâng cao' : 'Lọc nâng cao' }}
      </button>
      <button
        *ngIf="isFormNotEmpty()"
        type="button"
        (click)="onReset()"
        class="text-orange-500 px-2 py-2"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </form>
</div>

<!-- Advanced Filter -->
<div *ngIf="showAdvanceFilter" class="bg-gray-50 p-4 rounded-md mt-4 border border-gray-200">
  <div class="flex flex-wrap gap-2 items-center">
    <!-- Title "Lọc nâng cao" -->
    <h3 class="text-base font-semibold text-purple-800 bg-purple-100 border border-purple-800 px-3 py-2 rounded-md">
      Lọc nâng cao
    </h3>

    <!-- Position -->
    <div class="w-40">
      <select
        formControlName="positionId"
        class="w-full px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none transition-all"
      >
        <option value="">Tất cả vị trí</option>
        <option *ngFor="let item of positionOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Experience -->
    <div class="w-40">
      <select
        formControlName="experienceId"
        class="w-full px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none transition-all"
      >
        <option value="">Tất cả kinh nghiệm</option>
        <option *ngFor="let item of experienceOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Job Type -->
    <div class="w-40">
      <select
        formControlName="jobTypeId"
        class="w-full px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none transition-all"
      >
        <option value="">Tất cả hình thức</option>
        <option *ngFor="let item of jobTypeOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Type of Workplace -->
    <div class="w-40">
      <select
        formControlName="typeOfWorkplaceId"
        class="w-full px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none transition-all"
      >
        <option value="">Tất cả loại hình làm việc</option>
        <option *ngFor="let item of typeOfWorkplaceOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Gender -->
    <div class="w-40">
      <select
        formControlName="genderId"
        class="w-full px-3 py-2 rounded-md border border-gray-300 bg-white text-gray-900 focus:outline-none transition-all"
      >
        <option value="">Tất cả giới tính</option>
        <option *ngFor="let item of genderOptions" [value]="item.id">{{ item.name }}</option>
      </select>
    </div>

    <!-- Reset Button (Trash Icon) -->
    <button
      type="button"
      (click)="onReset()"
      class="bg-orange-500 border border-orange-600 text-white px-3 py-2 rounded-md hover:bg-orange-600 transition-all duration-300 flex items-center gap-1"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5-4h4a1 1 0 011 1v1H9V4a1 1 0 011-1z" />
      </svg>
      Xoá
    </button>
  </div>
</div>
