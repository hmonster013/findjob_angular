<!-- job-by-category.component.html -->

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

  <!-- Theo Nghề Nghiệp -->
  <div class="p-4 border rounded-lg bg-white shadow">
    <h3 class="text-primary-600 font-semibold text-lg border-b pb-2 mb-4">
      Việc làm theo nghề nghiệp
    </h3>
    <div class="space-y-2">
      <div
        *ngFor="let career of careerOptions.slice(0, maxItem)"
        (click)="handleFilter(career.id, 'CAREER')"
        class="cursor-pointer px-3 py-1.5 rounded transition-all hover:bg-primary-100 hover:text-primary-600 hover:translate-x-2"
      >
        {{ career.name }}
      </div>
      <a
        *ngIf="careerOptions.length > maxItem"
        [routerLink]="['/', ROUTES.JOB_SEEKER.JOBS_BY_CAREER]"
        class="text-primary-600 font-semibold flex items-center gap-2 mt-2 hover:text-primary-800"
      >
        Xem tất cả nghề nghiệp
        <span>➔</span>
      </a>
    </div>
  </div>

  <!-- Theo Khu Vực -->
  <div class="p-4 border rounded-lg bg-white shadow">
    <h3 class="text-primary-600 font-semibold text-lg border-b pb-2 mb-4">
      Việc làm theo khu vực
    </h3>
    <div class="space-y-2">
      <div
        *ngFor="let city of cityOptions.slice(0, maxItem)"
        (click)="handleFilter(city.id, 'CITY')"
        class="cursor-pointer px-3 py-1.5 rounded transition-all hover:bg-primary-100 hover:text-primary-600 hover:translate-x-2"
      >
        {{ city.name }}
      </div>
      <a
        *ngIf="cityOptions.length > maxItem"
        [routerLink]="['/', ROUTES.JOB_SEEKER.JOBS_BY_CITY]"
        class="text-primary-600 font-semibold flex items-center gap-2 mt-2 hover:text-primary-800"
      >
        Xem tất cả khu vực
        <span>➔</span>
      </a>
    </div>
  </div>

  <!-- Theo Hình Thức Làm Việc -->
  <div class="p-4 border rounded-lg bg-white shadow">
    <h3 class="text-primary-600 font-semibold text-lg border-b pb-2 mb-4">
      Việc làm theo hình thức
    </h3>
    <div class="space-y-2">
      <div
        *ngFor="let jobType of jobTypeOptions.slice(0, maxItem)"
        (click)="handleFilter(jobType.id, 'JOB_TYPE')"
        class="cursor-pointer px-3 py-1.5 rounded transition-all hover:bg-primary-100 hover:text-primary-600 hover:translate-x-2"
      >
        {{ jobType.name }}
      </div>
      <a
        *ngIf="jobTypeOptions.length > maxItem"
        [routerLink]="['/', ROUTES.JOB_SEEKER.JOBS_BY_TYPE]"
        class="text-primary-600 font-semibold flex items-center gap-2 mt-2 hover:text-primary-800"
      >
        Xem tất cả hình thức
        <span>➔</span>
      </a>
    </div>
  </div>

</div>
