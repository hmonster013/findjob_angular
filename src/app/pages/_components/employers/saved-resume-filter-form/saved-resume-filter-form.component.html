<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="flex flex-row items-center gap-2 p-4 overflow-x-auto"
>
  <div class="flex-1 min-w-[120px]">
    <input
      type="text"
      formControlName="kw"
      placeholder="Tên tin đăng hoặc ứng viên"
      class="w-full h-10 px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-xs"
    />
    <div
      *ngIf="form.get('kw')?.touched && form.get('kw')?.errors?.['maxlength']"
      class="text-red-500 text-xs mt-1"
    >
      Tên không được vượt quá 100 ký tự
    </div>
  </div>

  <div class="w-24 min-w-[80px]">
    <input
      type="number"
      formControlName="salaryMax"
      placeholder="Lương tối đa"
      class="w-full h-10 px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-xs"
    />
    <div
      *ngIf="
        form.get('salaryMax')?.touched && form.get('salaryMax')?.errors?.['min']
      "
      class="text-red-500 text-xs mt-1"
    >
      Lương tối đa phải ≥ 0
    </div>
  </div>

  <div class="w-32 min-w-[80px]">
    <select
      formControlName="experienceId"
      class="w-full h-10 px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-xs"
    >
      <option [ngValue]="null">Kinh nghiệm</option>
      <option *ngFor="let option of configs?.experienceOptions" [ngValue]="option.id">
        {{ option.name }}
      </option>
    </select>
  </div>

  <div class="w-32 min-w-[80px]">
    <select
      formControlName="cityId"
      class="w-full h-10 px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-xs"
    >
      <option [ngValue]="null">Địa điểm</option>
      <option *ngFor="let option of configs?.cityOptions" [ngValue]="option.id">
        {{ option.name }}
      </option>
    </select>
  </div>

  <div class="flex items-center gap-2">
    <button
      type="button"
      (click)="onReset()"
      class="w-8 h-8 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600"
      title="Đặt lại"
    >
      <i class="fas fa-sync-alt"></i>
    </button>

    <button
      type="submit"
      class="h-10 px-3 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-md text-sm font-medium flex items-center gap-2 disabled:bg-gray-400 min-w-[80px] sm:text-xs"
      [disabled]="!form.valid"
    >
      <i class="fas fa-search"></i> Tìm kiếm
    </button>
  </div>
</form>
