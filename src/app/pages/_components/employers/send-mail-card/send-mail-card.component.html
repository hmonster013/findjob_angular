<!-- Modal overlay -->
<div *ngIf="openPopup" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
  <div class="bg-white w-full max-w-2xl rounded-lg p-6 relative">
    <button (click)="closePopup()" class="absolute top-2 right-2 text-gray-500 hover:text-gray-800">
      ✖️
    </button>

    <h2 class="text-xl font-bold mb-4">Gửi mail</h2>

    <form (ngSubmit)="onSubmit()" [formGroup]="mailForm" class="space-y-4">
      <div>
        <label class="block mb-1 font-medium">Tên người nhận *</label>
        <input formControlName="fullName" type="text" [disabled]="true" class="w-full px-4 py-2 border rounded-md" />
        <div *ngIf="mailForm.get('fullName')?.invalid && mailForm.get('fullName')?.touched" class="text-red-500 text-sm">
          Vui lòng nhập tên người nhận hợp lệ.
        </div>
      </div>

      <div>
        <label class="block mb-1 font-medium">Email người nhận *</label>
        <input formControlName="email" type="email" [disabled]="true" class="w-full px-4 py-2 border rounded-md" />
        <div *ngIf="mailForm.get('email')?.invalid && mailForm.get('email')?.touched" class="text-red-500 text-sm">
          Vui lòng nhập email hợp lệ.
        </div>
      </div>

      <div>
        <label class="block mb-1 font-medium">Tiêu đề *</label>
        <input formControlName="title" type="text" class="w-full px-4 py-2 border rounded-md" />
        <div *ngIf="mailForm.get('title')?.invalid && mailForm.get('title')?.touched" class="text-red-500 text-sm">
          Tiêu đề email không hợp lệ.
        </div>
      </div>

      <div>
        <label class="block mb-1 font-medium">Nội dung email *</label>
        <textarea formControlName="content" rows="5" class="w-full px-4 py-2 border rounded-md"></textarea>
        <div *ngIf="mailForm.get('content')?.invalid && mailForm.get('content')?.touched" class="text-red-500 text-sm">
          Nội dung email không được để trống.
        </div>
      </div>

      <div class="flex items-center space-x-2">
        <input id="isSendMe" type="checkbox" formControlName="isSendMe" />
        <label for="isSendMe" class="text-sm">Gửi một bản sao đến địa chỉ email nhà tuyển dụng của tôi.</label>
      </div>

      <div class="flex justify-end">
        <button
          type="submit"
          class="px-6 py-2 bg-primary-500 text-white rounded-md hover:bg-primary-600"
        >
          📧 Gửi
        </button>
      </div>
    </form>
  </div>
</div>
