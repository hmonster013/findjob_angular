<div class="p-6 rounded-lg border border-gray-100 shadow-md bg-white h-full flex flex-col space-y-6 chart-container">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold text-gray-800">{{ title }}</h2>
    <div class="tooltip">
      <svg class="w-5 h-5 text-gray-400 hover:text-primary-500" fill="currentColor" viewBox="0 0 20 20">
        <path d="M9 2a7 7 0 017 7c0 2.21-1.2 4.16-3 5.3v1.2a1 1 0 01-2 0v-1a1 1 0 01.4-.8A5 5 0 109 4a1 1 0 010-2z" />
      </svg>
      <span class="tooltiptext">Thống kê việc làm và ứng tuyển trong vòng 1 tháng gần nhất</span>
    </div>
  </div>

  <div class="border-t border-dashed"></div>

  <div class="flex-1">
    <div class="flex justify-end mb-3 gap-2">
      <input
        type="date"
        [value]="selectedDateRange[0].format('YYYY-MM-DD')"
        (change)="onDateChange($event, 'start')"
        class="border rounded px-2 py-1"
      />
      <input
        type="date"
        [value]="selectedDateRange[1].format('YYYY-MM-DD')"
        (change)="onDateChange($event, 'end')"
        class="border rounded px-2 py-1"
      />
      <button
        class="btn btn-primary"
        (click)="onSubmitDateChange()"
        [disabled]="!allowSubmit"
      >
        Cập nhật
      </button>
    </div>

    <div class="relative min-h-[360px]">
      <!-- Loading state -->
      <div *ngIf="isLoading" class="flex items-center justify-center h-[360px]">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-primary-500"></div>
      </div>

      <!-- Error state -->
      <div *ngIf="!isLoading && errorMessage" class="flex items-center justify-center h-[360px] bg-gray-50 rounded-md error-state">
        <div>
          <h3>Lỗi tải dữ liệu</h3>
          <p class="error-message">{{ errorMessage }}</p>
          <img src="/assets/images/error.svg" alt="Error state">
        </div>
      </div>

      <!-- Empty state -->
      <div *ngIf="!isLoading && !errorMessage && (!data || !data.labels || data.labels.length === 0)" class="flex items-center justify-center h-[360px] bg-gray-50 rounded-md empty-state">
        <div>
          <h3>Không có dữ liệu</h3>
          <p>Không có dữ liệu để thống kê trong khoảng thời gian này</p>
          <img src="/assets/images/empty.svg" alt="Empty state">
        </div>
      </div>

      <!-- Chart -->
      <div class="h-[360px] chart-wrapper" [ngClass]="{'visible': !isLoading && !errorMessage && data && data.labels && data.labels.length > 0}">
        <canvas #chartCanvas class="h-full w-full"></canvas>
      </div>
    </div>
  </div>
</div>
