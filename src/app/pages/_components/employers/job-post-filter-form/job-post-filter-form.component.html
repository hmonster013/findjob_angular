<div class="bg-white p-4 sm:p-6 rounded-xl border border-gray-200 shadow-md">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col sm:flex-row flex-wrap gap-4 items-start sm:items-center">
    <!-- Keyword Search -->
    <div class="flex-1 min-w-[160px] sm:min-w-[200px] w-full sm:w-auto">
      <div class="relative">
        <input
          type="text"
          formControlName="kw"
          placeholder="Nhập tên tin đăng"
          class="w-full pl-10 pr-4 py-2 sm:py-3 rounded-lg border border-gray-200 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all hover:shadow-sm"
        />
        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-orange-600 text-base sm:text-lg"></i>
      </div>
    </div>

    <!-- Urgent Status -->
    <div class="w-full sm:w-40">
      <select
        formControlName="isUrgent"
        class="w-full px-3 py-2 sm:py-3 rounded-lg border border-gray-200 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all hover:shadow-sm"
      >
        <option value="">Trạng thái tuyển dụng</option>
        <option *ngFor="let option of urgentOptions" [value]="option.id">
          {{ option.name }}
        </option>
      </select>
    </div>

    <!-- Approval Status -->
    <div class="w-full sm:w-40">
      <select
        formControlName="statusId"
        class="w-full px-3 py-2 sm:py-3 rounded-lg border border-gray-200 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all hover:shadow-sm"
      >
        <option value="">Trạng thái duyệt</option>
        <option *ngFor="let option of statusOptions" [value]="option.id">
          {{ option.name }}
        </option>
      </select>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 items-center w-full sm:w-auto">
      <button
        type="submit"
        class="w-full sm:w-auto bg-gradient-to-r from-orange-500 to-orange-600 text-white px-4 sm:px-5 py-2 sm:py-3 rounded-lg hover:from-orange-600 hover:to-orange-700 transition-all duration-300 shadow-md hover:shadow-lg"
      >
        Tìm kiếm
      </button>
    </div>
  </form>
</div>
