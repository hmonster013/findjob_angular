<div class="container">
  <app-backdrop-loading *ngIf="isFullScreenLoading"></app-backdrop-loading>

  <!-- Top Filters -->
  <form [formGroup]="filterForm" class="filters">
    <div class="filter-row">
      <select formControlName="jobPostId" class="filter-select" (change)="onFilter()">
        <option [ngValue]="null">-- Tất cả tin tuyển --</option>
        <option *ngFor="let job of jobs" [ngValue]="job.id">{{ job.jobName }}</option>
      </select>

      <select formControlName="applicationStatus" class="filter-select" (change)="onFilter()">
        <option [ngValue]="null">-- Tất cả trạng thái --</option>
        <option *ngFor="let option of applicationStatusOptions" [value]="option.id">
          {{ option.name }}
        </option>
      </select>

      <button type="button" (click)="openFilter = true" class="filter-button">
        <i class="fas fa-filter"></i> Lọc nâng cao
      </button>
    </div>

    <div>
      <button type="button" (click)="handleExport()" class="export-button" [disabled]="resumes.length === 0">
        <i class="fas fa-file-excel"></i> Xuất Excel
      </button>
    </div>
  </form>

  <!-- Applied Resume Table -->
  <app-applied-resume-table
    [dataSource]="resumes"
    [isLoading]="isLoading"
    [total]="total"
    [page]="page"
    [rowsPerPage]="pageSize"
    (delete)="handleDelete($event)"
    (changeStatus)="handleChangeStatus($event.id, $event.status)"
    (sendEmail)="handleSendEmail($event)"
    (pageChange)="onPageChange($event)"
    (rowsPerPageChange)="onRowsPerPageChange($event)"
  ></app-applied-resume-table>

  <!-- Popup Filter -->
  <div *ngIf="openFilter" class="filter-popup">
    <div class="filter-popup-content">
      <button type="button" (click)="openFilter = false" class="close-button">
        <i class="fas fa-times"></i>
      </button>

      <h2>Lọc nâng cao</h2>

      <form [formGroup]="filterForm" (ngSubmit)="onFilter()">
        <div>
          <label>Tin tuyển dụng</label>
          <select formControlName="jobPostId" class="filter-select">
            <option [ngValue]="null">-- Tất cả tin tuyển --</option>
            <option *ngFor="let job of jobs" [ngValue]="job.id">{{ job.jobName }}</option>
          </select>
        </div>

        <div>
          <label>Trạng thái ứng tuyển</label>
          <select formControlName="applicationStatus" class="filter-select">
            <option [ngValue]="null">-- Tất cả trạng thái --</option>
            <option *ngFor="let option of applicationStatusOptions" [value]="option.id">
              {{ option.name }}
            </option>
          </select>
        </div>

        <div style="text-align: right;">
          <button type="submit" class="filter-popup-button">
            <i class="fas fa-filter"></i> Áp dụng
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
