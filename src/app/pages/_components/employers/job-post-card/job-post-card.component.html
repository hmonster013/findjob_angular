<div class="bg-white rounded-lg shadow flex flex-col flex-1 h-full w-full">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 p-4 sm:p-6 bg-white border-b border-gray-100">
    <h1 class="text-2xl font-semibold text-orange-600">Quản lý tin tuyển dụng</h1>
    <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
      <button
        class="flex items-center gap-2 px-3 sm:px-4 py-1.5 sm:py-2 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white rounded-md text-sm font-medium hover:shadow-md transition-all duration-300"
        (click)="onExport()"
      >
        <i class="fas fa-download text-lg"></i>
        Tải danh sách
      </button>
      <button
        class="flex items-center gap-2 px-3 sm:px-4 py-1.5 sm:py-2 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white rounded-md text-sm font-medium hover:shadow-md transition-all duration-300"
        (click)="onOpenCreate()"
      >
        <i class="fas fa-plus text-lg"></i>
        Thêm mới
      </button>
    </div>
  </div>

  <!-- Filter Form -->
  <div class="p-4 sm:p-6 bg-white">
    <app-job-post-filter-form (filter)="onFilter($event)"></app-job-post-filter-form>
  </div>

  <!-- Loading Progress -->
  <div *ngIf="isLoadingList && !isFullScreenLoading" class="w-full h-1 bg-orange-200 rounded-full overflow-hidden mx-4 sm:mx-6">
    <div class="h-full bg-orange-600 animate-pulse"></div>
  </div>

  <!-- Table -->
  <div class="flex-1 mx-4 sm:mx-6 mb-4 sm:mb-6">
    <app-job-posts-table
      [dataSource]="list"
      [total]="total"
      [page]="page"
      [rowsPerPage]="rowsPerPage"
      [orderBy]="orderBy"
      [order]="order"
      [headCells]="headCells"
      [isLoading]="isLoadingList"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      (pageChange)="onPageChange($event)"
      (rowsPerPageChange)="onRowsPerPageChange($event)"
      (sortChange)="onSortChange($event)"
    ></app-job-posts-table>
  </div>

  <!-- Popup Modal -->
  <div *ngIf="openPopup" class="fixed inset-0 bg-orange-500/50 flex justify-center items-center z-[1000] p-4 animate-fadeInUp">
    <div class="bg-white w-full max-w-4xl rounded-lg relative max-h-[90vh] flex flex-col overflow-hidden">
      <button
        (click)="openPopup = false"
        class="absolute top-4 right-4 text-gray-500 hover:text-orange-800 z-10"
      >
        <i class="fas fa-times text-xl"></i>
      </button>

      <h2 class="text-xl font-bold p-4 sm:p-6 pb-0 text-orange-600">
        {{ editData ? 'Cập nhật tin tuyển dụng' : 'Tạo mới tin tuyển dụng' }}
      </h2>

      <div class="flex-1 overflow-y-auto p-4 sm:p-6">
        <app-job-post-form
          [editData]="editData"
          [serverErrors]="serverErrors"
          (handleAddOrUpdate)="onSave($event)"
        ></app-job-post-form>
      </div>
    </div>
  </div>
</div>
