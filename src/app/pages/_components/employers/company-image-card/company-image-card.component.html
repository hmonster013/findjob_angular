<div class="card-container space-y-4">
  <app-backdrop-loading *ngIf="isFullScreenLoading"></app-backdrop-loading>

  <div class="text-lg font-bold text-gray-700">Thư viện ảnh công ty</div>

  <!-- Skeleton Loading -->
  <div *ngIf="isLoadingCompany" class="gallery-container">
    <div *ngFor="let _ of [1,2,3,4,5]" class="skeleton-pulse"></div>
  </div>

  <!-- Upload Button -->
  <div *ngIf="!isLoadingCompany && fileList.length < 15" class="upload-container">
    <label for="file-upload" class="upload-label flex flex-col items-center gap-2">
      <i class="fas fa-camera text-2xl"></i>
      Tải ảnh lên (Tối đa 15 ảnh)
    </label>
    <input id="file-upload" type="file" multiple (change)="onFileSelected($event)" accept="image/jpeg,image/png" class="hidden" aria-label="Upload ảnh công ty" />
  </div>
  <div *ngIf="!isLoadingCompany && fileList.length >= 15" class="text-center text-gray-500">
    Đã đạt giới hạn 15 ảnh.
  </div>

  <!-- Gallery -->
  <div *ngIf="!isLoadingCompany" class="gallery-container">
    <div *ngFor="let image of fileList" class="image-item">
      <img
        [src]="image.url"
        alt="Ảnh công ty"
        (click)="onPreviewImage(image)"
      />
      <button
        (click)="onDeleteImage(image)"
        class="delete-button"
        aria-label="Xóa ảnh"
      >
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <!-- Preview Modal -->
  <div *ngIf="previewVisible" class="preview-modal">
    <div class="preview-content">
      <button (click)="previewVisible = false" class="close-button" aria-label="Đóng preview">
        <i class="fas fa-times"></i>
      </button>
      <img [src]="previewImage" alt="Preview" class="w-full rounded-lg shadow" />
    </div>
  </div>
</div>
