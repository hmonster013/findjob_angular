<div class="space-y-4">
  <app-backdrop-loading *ngIf="isFullScreenLoading"></app-backdrop-loading>

  <div class="text-lg font-bold text-gray-700">Thư viện ảnh công ty</div>

  <!-- Upload Button -->
  <div *ngIf="fileList.length < 15" class="border-2 border-dashed rounded-lg p-6 text-center cursor-pointer">
    <label for="file-upload" class="cursor-pointer text-gray-500 hover:text-gray-700">
      📷 <br> Tải ảnh lên
    </label>
    <input id="file-upload" type="file" multiple (change)="onFileSelected($event)" class="hidden" />
  </div>

  <!-- Gallery -->
  <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
    <div *ngFor="let image of fileList" class="relative group">
      <img
        [src]="image.url"
        alt="Ảnh công ty"
        class="object-cover w-full h-32 rounded-lg cursor-pointer"
        (click)="onPreviewImage(image)"
      />

      <button
        (click)="onDeleteImage(image)"
        class="absolute top-1 right-1 bg-white rounded-full p-1 shadow hover:bg-red-500 hover:text-white"
      >
        ✖️
      </button>
    </div>
  </div>

  <!-- Preview Modal -->
  <div *ngIf="previewVisible" class="fixed inset-0 bg-black bg-opacity-60 flex justify-center items-center z-50">
    <div class="bg-white rounded-lg p-4 w-full max-w-2xl relative">
      <button (click)="previewVisible = false" class="absolute top-2 right-2 text-gray-500 hover:text-gray-700">
        ✖️
      </button>
      <img [src]="previewImage" alt="Preview" class="w-full rounded-lg shadow" />
    </div>
  </div>
</div>
