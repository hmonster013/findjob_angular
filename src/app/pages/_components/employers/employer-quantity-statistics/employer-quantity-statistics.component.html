<div class="relative">
  <app-backdrop-loading *ngIf="isLoading"></app-backdrop-loading>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <!-- Tổng số tin tuyển -->
    <div class="bg-white rounded-lg shadow p-6 flex items-center space-x-4">
      <div class="text-green-600 text-4xl">📄</div>
      <div>
        <div class="text-gray-700 font-semibold text-sm mb-1">Tất cả tin tuyển dụng</div>
        <div class="text-2xl font-bold text-green-600">{{ data.totalJobPost || 0 }}</div>
      </div>
    </div>

    <!-- Tin tuyển chờ duyệt -->
    <div class="bg-white rounded-lg shadow p-6 flex items-center space-x-4">
      <div class="text-yellow-500 text-4xl">⏳</div>
      <div>
        <div class="text-gray-700 font-semibold text-sm mb-1">Tin tuyển dụng chờ duyệt</div>
        <div class="text-2xl font-bold text-yellow-500">{{ data.totalJobPostingPendingApproval || 0 }}</div>
      </div>
    </div>

    <!-- Tin tuyển hết hạn -->
    <div class="bg-white rounded-lg shadow p-6 flex items-center space-x-4">
      <div class="text-red-600 text-4xl">❌</div>
      <div>
        <div class="text-gray-700 font-semibold text-sm mb-1">Tin tuyển dụng hết hạn</div>
        <div class="text-2xl font-bold text-red-600">{{ data.totalJobPostExpired || 0 }}</div>
      </div>
    </div>

    <!-- Ứng viên ứng tuyển -->
    <div class="bg-white rounded-lg shadow p-6 flex items-center space-x-4">
      <div class="text-blue-500 text-4xl">👤</div>
      <div>
        <div class="text-gray-700 font-semibold text-sm mb-1">Ứng viên ứng tuyển</div>
        <div class="text-2xl font-bold text-blue-500">{{ data.totalApply || 0 }}</div>
      </div>
    </div>
  </div>
</div>
