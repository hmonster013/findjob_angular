<form [formGroup]="searchForm" class="space-y-6 p-4 sm:p-6 bg-white shadow-md rounded-lg">
  <!-- Keyword Search -->
  <div>
    <label for="keyword" class="block text-sm font-medium text-gray-700 mb-1">Từ khóa tìm kiếm</label>
    <input
      id="keyword"
      type="text"
      formControlName="keyword"
      placeholder="Nhập từ khóa (VD: lập trình viên, marketing...)"
      class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
      aria-label="Từ khóa tìm kiếm"
    />
  </div>

  <!-- Advanced Filters -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div>
      <label for="city" class="block text-sm font-medium text-gray-700 mb-1">Tỉnh/Thành phố</label>
      <select
        id="city"
        formControlName="city"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        aria-label="Tỉnh/Thành phố"
      >
        <option *ngFor="let city of cities" [value]="city.value">{{ city.label }}</option>
      </select>
    </div>

    <div>
      <label for="career" class="block text-sm font-medium text-gray-700 mb-1">Ngành nghề</label>
      <select
        id="career"
        formControlName="career"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        aria-label="Ngành nghề"
      >
        <option *ngFor="let career of careers" [value]="career.value">{{ career.label }}</option>
      </select>
    </div>

    <div>
      <label for="experience" class="block text-sm font-medium text-gray-700 mb-1">Kinh nghiệm</label>
      <select
        id="experience"
        formControlName="experience"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        aria-label="Kinh nghiệm"
      >
        <option *ngFor="let exp of experiences" [value]="exp.value">{{ exp.label }}</option>
      </select>
    </div>

    <div>
      <label for="position" class="block text-sm font-medium text-gray-700 mb-1">Vị trí mong muốn</label>
      <select
        id="position"
        formControlName="position"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        aria-label="Vị trí mong muốn"
      >
        <option *ngFor="let pos of positions" [value]="pos.value">{{ pos.label }}</option>
      </select>
    </div>

    <div>
      <label for="academicLevel" class="block text-sm font-medium text-gray-700 mb-1">Trình độ học vấn</label>
      <select
        id="academicLevel"
        formControlName="academicLevel"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        aria-label="Trình độ học vấn"
      >
        <option *ngFor="let level of academicLevels" [value]="level.value">{{ level.label }}</option>
      </select>
    </div>

    <div>
      <label for="workplace" class="block text-sm font-medium text-gray-700 mb-1">Hình thức làm việc</label>
      <select
        id="workplace"
        formControlName="workplace"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        aria-label="Hình thức làm việc"
      >
        <option *ngFor="let wp of workplaces" [value]="wp.value">{{ wp.label }}</option>
      </select>
    </div>

    <div>
      <label for="jobType" class="block text-sm font-medium text-gray-700 mb-1">Loại công việc</label>
      <select
        id="jobType"
        formControlName="jobType"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        aria-label="Loại công việc"
      >
        <option *ngFor="let jt of jobTypes" [value]="jt.value">{{ jt.label }}</option>
      </select>
    </div>

    <div>
      <label for="gender" class="block text-sm font-medium text-gray-700 mb-1">Giới tính</label>
      <select
        id="gender"
        formControlName="gender"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        aria-label="Giới tính"
      >
        <option *ngFor="let gender of genders" [value]="gender.value">{{ gender.label }}</option>
      </select>
    </div>

    <div>
      <label for="maritalStatus" class="block text-sm font-medium text-gray-700 mb-1">Tình trạng hôn nhân</label>
      <select
        id="maritalStatus"
        formControlName="maritalStatus"
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        aria-label="Tình trạng hôn nhân"
      >
        <option *ngFor="let status of maritalStatuses" [value]="status.value">{{ status.label }}</option>
      </select>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="flex flex-wrap gap-4 justify-center sm:justify-start">
    <button
      (click)="onSubmit()"
      [disabled]="isFormEmpty()"
      class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md shadow-sm transition duration-150 disabled:opacity-50 disabled:cursor-not-allowed"
      aria-label="Tìm kiếm"
    >
      <i class="fas fa-search"></i> Tìm kiếm
    </button>
    <button
      (click)="onReset()"
      class="flex items-center gap-2 px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-md shadow-sm transition duration-150"
      aria-label="Đặt lại"
    >
      <i class="fas fa-times"></i> Đặt lại
    </button>
  </div>
</form>
