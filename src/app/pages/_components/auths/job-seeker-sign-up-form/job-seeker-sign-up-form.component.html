<form [formGroup]="form" (ngSubmit)="handleSubmit()" class="space-y-4">

  <!-- Full Name -->
  <div>
    <label class="text-sm font-medium text-gray-700">Họ và tên</label>
    <input
      type="text"
      formControlName="fullName"
      placeholder="Nhập họ và tên"
      class="w-full border px-3 py-2 rounded focus:outline-none focus:ring"
    />
    <div *ngIf="form.get('fullName')?.invalid && form.get('fullName')?.touched" class="text-red-500 text-sm mt-1">
      Họ và tên không được để trống.
    </div>
    <div *ngIf="serverErrors?.fullName" class="text-red-500 text-sm mt-1">
      {{ serverErrors.fullName }}
    </div>
  </div>

  <!-- Email -->
  <div>
    <label class="text-sm font-medium text-gray-700">Email</label>
    <input
      type="email"
      formControlName="email"
      placeholder="Nhập email"
      class="w-full border px-3 py-2 rounded focus:outline-none focus:ring"
    />
    <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-red-500 text-sm mt-1">
      Email không hợp lệ.
    </div>
    <div *ngIf="serverErrors?.email" class="text-red-500 text-sm mt-1">
      {{ serverErrors.email }}
    </div>
  </div>

  <!-- Password -->
  <div>
    <label class="text-sm font-medium text-gray-700">Mật khẩu</label>
    <input
      type="password"
      formControlName="password"
      placeholder="Nhập mật khẩu"
      class="w-full border px-3 py-2 rounded focus:outline-none focus:ring"
    />
    <div *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="text-red-500 text-sm mt-1">
      Mật khẩu không được để trống.
    </div>
    <div *ngIf="serverErrors?.password" class="text-red-500 text-sm mt-1">
      {{ serverErrors.password }}
    </div>
  </div>

  <!-- Confirm Password -->
  <div>
    <label class="text-sm font-medium text-gray-700">Xác nhận mật khẩu</label>
    <input
      type="password"
      formControlName="confirmPassword"
      placeholder="Xác nhận mật khẩu"
      class="w-full border px-3 py-2 rounded focus:outline-none focus:ring"
    />
    <div *ngIf="form.hasError('mismatch') && form.get('confirmPassword')?.touched" class="text-red-500 text-sm mt-1">
      Mật khẩu xác nhận không khớp.
    </div>
  </div>

  <!-- Submit -->
  <button
    type="submit"
    class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition disabled:opacity-50"
    [disabled]="form.invalid"
  >
    Đăng ký
  </button>

  <!-- Social login -->
  <div class="flex items-center my-4">
    <hr class="flex-grow border-gray-300" />
    <span class="mx-2 text-gray-400 text-sm">Hoặc</span>
    <hr class="flex-grow border-gray-300" />
  </div>

  <button
    type="button"
    (click)="handleFacebookLogin()"
    class="w-full bg-[#3b5998] text-white py-2 rounded hover:bg-[#2d4373] transition"
  >
    Đăng ký bằng Facebook
  </button>

  <button
    type="button"
    (click)="handleGoogleLogin()"
    class="w-full bg-white border text-gray-700 py-2 rounded hover:bg-gray-100 transition mt-2"
  >
    Đăng ký bằng Google
  </button>
</form>
