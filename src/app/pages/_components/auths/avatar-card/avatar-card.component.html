<div class="flex flex-col items-center relative group mb-4 shadow-md rounded-lg p-4">
  <div class="relative w-32 h-32 p-2 rounded-full bg-gradient-to-r from-blue-600 to-blue-700 shadow-lg">
    <img
      [src]="currentUser?.avatarUrl || 'assets/images/default-avatar.png'"
      class="w-full h-full rounded-full object-cover border-2 border-white"
      alt="Avatar"
    />

    <!-- Overlay buttons -->
    <div class="absolute inset-0 bg-black bg-opacity-40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity duration-200">
      <div class="flex space-x-2">
        <!-- Upload button -->
        <label class="cursor-pointer">
          <input type="file" class="hidden" (change)="onSelectFile($event)" />
          <div class="bg-blue-100 p-2 rounded-full shadow-sm hover:bg-blue-200 text-blue-600 text-base transition-colors duration-200">
            <i class="fas fa-upload"></i>
          </div>
        </label>

        <!-- Delete button -->
        <button type="button" (click)="onDelete()" class="bg-blue-100 p-2 rounded-full shadow-sm hover:bg-blue-200 text-blue-600 text-base transition-colors duration-200">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="mt-2 text-sm font-semibold text-gray-800">
    Ảnh đại diện
  </div>

  <!-- Loading Full Screen -->
  <div *ngIf="isFullScreenLoading" class="fixed inset-0 z-50 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="animate-spin rounded-full h-10 w-10 border-2 border-blue-600 border-t-transparent shadow-sm"></div>
  </div>
</div>
