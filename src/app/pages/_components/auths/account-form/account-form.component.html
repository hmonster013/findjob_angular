<form [formGroup]="accountForm" (ngSubmit)="onSubmit()" id="account-form" class="space-y-6">
  <!-- Full Name -->
  <div>
    <label class="block font-medium text-gray-700 mb-1">
      Họ và tên <span class="text-red-500">*</span>
    </label>
    <input type="text" formControlName="fullName" placeholder="Nhập họ và tên"
      class="input input-bordered w-full" />

    <div *ngIf="accountForm.get('fullName')?.errors" class="text-red-500 text-sm mt-1">
      {{ accountForm.get('fullName')?.errors?.['required'] ? 'Họ và tên là bắt buộc.' : '' }}
      {{ accountForm.get('fullName')?.errors?.['maxlength'] ? 'Họ và tên vượt quá độ dài cho phép.' : '' }}
      {{ accountForm.get('fullName')?.errors?.['server'] }}
    </div>
  </div>

  <!-- Email -->
  <div>
    <label class="block font-medium text-gray-700 mb-1">
      Email <span class="text-red-500">*</span>
    </label>
    <input type="email" formControlName="email" placeholder="Nhập email"
      class="input input-bordered w-full bg-gray-100 cursor-not-allowed" [disabled]="true" />
  </div>

  <!-- Password -->
  <div>
    <label class="block font-medium text-gray-700 mb-1">
      Mật khẩu <span class="text-red-500">*</span>
    </label>
    <input type="password" formControlName="password" placeholder="Nhập mật khẩu"
      class="input input-bordered w-full bg-gray-100 cursor-not-allowed" [disabled]="true" />
  </div>

  <div class="flex justify-end">
    <button type="submit" class="px-6 py-2 bg-primary-600 text-white rounded hover:bg-primary-700">
      Cập nhật
    </button>
  </div>
</form>
