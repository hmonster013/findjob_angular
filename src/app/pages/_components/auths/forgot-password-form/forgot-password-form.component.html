<form [formGroup]="form" (ngSubmit)="handleSubmit()" class="space-y-6">
  <div class="flex flex-col">
    <label class="mb-2 text-sm font-medium text-gray-700">
      Email <span class="text-red-500">*</span>
    </label>
    <input
      formControlName="email"
      type="email"
      placeholder="Nhập email"
      class="input input-bordered w-full"
    />
    <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-red-500 text-sm mt-1">
      <div *ngIf="form.get('email')?.errors?.['required']">Email là bắt buộc!</div>
      <div *ngIf="form.get('email')?.errors?.['email']">Email không đúng định dạng!</div>
    </div>
  </div>

  <button
    type="submit"
    class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2 rounded mt-4"
  >
    Đặt lại mật khẩu
  </button>
</form>
