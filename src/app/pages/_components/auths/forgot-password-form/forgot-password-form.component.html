<form [formGroup]="form" (ngSubmit)="handleSubmit()" class="space-y-6">
  <div class="flex flex-col">
    <label for="email" class="mb-2 text-sm font-medium text-gray-700">
      Email <span class="text-red-500">*</span>
    </label>
    <input
      id="email"
      formControlName="email"
      type="email"
      placeholder="Nhập email"
      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
    />
    <div *ngIf="emailError" class="text-red-500 text-sm mt-1">
      {{ emailError }}
    </div>
  </div>

  <button
    type="submit"
    [disabled]="form.invalid"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded mt-4 disabled:opacity-60"
  >
    Đặt lại mật khẩu
  </button>

</form>
