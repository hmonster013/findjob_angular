<form [formGroup]="form" (ngSubmit)="submitForm()" class="space-y-6">
  <div class="flex flex-col">
    <label class="mb-2 text-sm font-medium text-gray-700">
      Mật khẩu mới <span class="text-red-500">*</span>
    </label>
    <input formControlName="newPassword" type="password" placeholder="Nhập mật khẩu mới" class="input input-bordered w-full" />
    <div *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched" class="text-red-500 text-sm mt-1">
      <div *ngIf="form.get('newPassword')?.errors?.['required']">Mật khẩu mới là bắt buộc!</div>
      <div *ngIf="form.get('newPassword')?.errors?.['minlength']">Mật khẩu tối thiểu 8 ký tự.</div>
      <div *ngIf="form.get('newPassword')?.errors?.['maxlength']">Mật khẩu tối đa 128 ký tự.</div>
      <div *ngIf="form.get('newPassword')?.errors?.['pattern']">Phải có chữ hoa, chữ thường, số và ký tự đặc biệt.</div>
      <div *ngIf="form.get('newPassword')?.errors?.['server']">{{ form.get('newPassword')?.errors?.['server'] }}</div>
    </div>
  </div>

  <div class="flex flex-col">
    <label class="mb-2 text-sm font-medium text-gray-700">
      Xác nhận mật khẩu <span class="text-red-500">*</span>
    </label>
    <input formControlName="confirmPassword" type="password" placeholder="Nhập lại mật khẩu mới" class="input input-bordered w-full" />
    <div *ngIf="(form.errors?.['mismatch'] || (form.get('confirmPassword')?.invalid && form.get('confirmPassword')?.touched))" class="text-red-500 text-sm mt-1">
      <div *ngIf="form.get('confirmPassword')?.errors?.['required']">Xác nhận mật khẩu là bắt buộc!</div>
      <div *ngIf="form.errors?.['mismatch']">Mật khẩu xác nhận không khớp!</div>
      <div *ngIf="form.get('confirmPassword')?.errors?.['server']">{{ form.get('confirmPassword')?.errors?.['server'] }}</div>
    </div>
  </div>

  <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2 rounded mt-4">
    Đặt lại mật khẩu
  </button>
</form>
