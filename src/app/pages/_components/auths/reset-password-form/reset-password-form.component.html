<form [formGroup]="form" (ngSubmit)="submitForm()" class="space-y-6">
  <!-- Mật khẩu mới -->
  <div class="flex flex-col">
    <label for="newPassword" class="mb-2 text-sm font-medium text-gray-700">
      Mật khẩu mới <span class="text-red-500">*</span>
    </label>
    <input
      id="newPassword"
      formControlName="newPassword"
      type="password"
      placeholder="Nhập mật khẩu mới"
      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
    />
    <div *ngIf="newPassword.touched && newPassword.errors" class="text-red-500 text-sm mt-1 space-y-1">
      <div *ngIf="newPassword.errors['required']">Mật khẩu mới là bắt buộc!</div>
      <div *ngIf="newPassword.errors['minlength']">Tối thiểu 8 ký tự.</div>
      <div *ngIf="newPassword.errors['maxlength']">Tối đa 128 ký tự.</div>
      <div *ngIf="newPassword.errors['pattern']">Phải có chữ hoa, thường, số, ký tự đặc biệt.</div>
      <div *ngIf="newPassword.errors['server']">{{ newPassword.errors['server'] }}</div>
      <div *ngIf="newPassword.errors['server']">{{ newPassword.errors['server'] }}</div>
    </div>
  </div>

  <!-- Xác nhận mật khẩu -->
  <div class="flex flex-col">
    <label for="confirmPassword" class="mb-2 text-sm font-medium text-gray-700">
      Xác nhận mật khẩu <span class="text-red-500">*</span>
    </label>
    <input
      id="confirmPassword"
      formControlName="confirmPassword"
      type="password"
      placeholder="Nhập lại mật khẩu mới"
      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
    />
    <div *ngIf="confirmPassword.touched && (confirmPassword.invalid || form.errors?.['mismatch'])" class="text-red-500 text-sm mt-1 space-y-1">
      <div *ngIf="confirmPassword.errors?.['required']">Xác nhận mật khẩu là bắt buộc!</div>
      <div *ngIf="form.errors?.['mismatch']">Mật khẩu xác nhận không khớp!</div>
      <div *ngIf="confirmPassword.errors?.['server']">{{ confirmPassword.errors?.['server'] }}</div>
    </div>
  </div>

  <!-- Nút submit -->
  <button
    type="submit"
    [disabled]="form.invalid || isSubmitting"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded mt-4 disabled:opacity-60 disabled:cursor-not-allowed"
  >
    Đặt lại mật khẩu
  </button>
</form>
