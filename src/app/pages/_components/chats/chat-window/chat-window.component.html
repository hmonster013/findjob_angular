<div class="flex flex-col h-full relative bg-gray-50">
  <!-- Loading toàn màn hình khi currentUserChat chưa sẵn sàng -->
  <ng-container *ngIf="isLoadingUser">
    <div class="flex justify-center items-center h-full">
      <i class="fas fa-spinner fa-spin text-orange-500 text-4xl"></i>
    </div>
  </ng-container>

  <!-- Nội dung chính khi currentUserChat sẵn sàng -->
  <ng-container *ngIf="!isLoadingUser">
    <!-- Header -->
    <ng-container *ngIf="selectedRoomId">
      <div class="absolute top-0 left-0 right-0 z-10 bg-orange-600 border-b border-gray-300">
        <ng-container *ngIf="!isLoadingRoom; else loadingRoom">
          <div>
            <app-chat-info
              [avatarUrl]="selectedRoom?.user?.avatarUrl || 'https://via.placeholder.com/54'"
              [title]="selectedRoom?.user?.name || '---'"
              [subTitle]="currentUser?.roleName === ROLES_NAME.JOB_SEEKER
                ? (selectedRoom?.user?.company?.companyName || '---')
                : (selectedRoom?.user?.email || '---')"
              [mode]="'row'"
            ></app-chat-info>
          </div>
        </ng-container>
        <ng-template #loadingRoom>
          <div class="flex justify-center items-center h-16">
            <i class="fas fa-spinner fa-spin text-white text-2xl"></i>
          </div>
        </ng-template>
      </div>
    </ng-container>

    <!-- Nội dung tin nhắn -->
    <div class="flex-grow overflow-hidden" [ngStyle]="{ 'margin-top': selectedRoomId ? '72px' : '0px', 'margin-bottom': selectedRoomId ? '80px' : '0px' }">
      <ng-container *ngIf="selectedRoomId; else noRoom">
        <div class="flex flex-col h-full">
          <div class="relative h-full">
            <ng-container *ngIf="isLoading; else showMessages">
              <div class="flex justify-center items-center h-full">
                <i class="fas fa-spinner fa-spin text-orange-500 text-4xl"></i>
              </div>
            </ng-container>

            <ng-template #showMessages>
              <ng-container *ngIf="messages.length === 0; else messageList">
                <div class="flex justify-center items-center h-full p-4">
                  <app-chat-info
                    [avatarUrl]="selectedRoom?.user?.avatarUrl || 'https://via.placeholder.com/54'"
                    [title]="selectedRoom?.user?.name || '---'"
                    [subTitle]="currentUser?.roleName === ROLES_NAME.JOB_SEEKER
                      ? (selectedRoom?.user?.company?.companyName || '---')
                      : (selectedRoom?.user?.email || '---')"
                    [description]="selectedRoom?.createdBy !== currentUserChat?.userId
                      ? (currentUser?.roleName === ROLES_NAME.JOB_SEEKER
                        ? (selectedRoom?.user?.company?.companyName || '---') + ' đã kết nối với bạn.'
                        : (selectedRoom?.user?.name || '---') + ' đã kết nối với bạn.')
                      : (currentUser?.roleName === ROLES_NAME.JOB_SEEKER
                        ? 'Bạn đã kết nối đến ' + (selectedRoom?.user?.company?.companyName || '---')
                        : 'Bạn đã kết nối đến ' + (selectedRoom?.user?.name || '---'))"
                  ></app-chat-info>
                </div>
              </ng-container>

              <ng-template #messageList>
                <div #messageListRef id="scrollableDiv" class="flex flex-col-reverse overflow-auto h-full p-4">
                  <div *ngFor="let value of messages; trackBy: trackByMessageId">
                    <app-message
                      [userId]="value.userId"
                      [text]="value.text"
                      [avatarUrl]="currentUserChat?.userId === value.userId
                        ? (currentUserChat?.avatarUrl || 'https://via.placeholder.com/54')
                        : (selectedRoom?.user?.avatarUrl || 'https://via.placeholder.com/54')"
                      [createdAt]="value.createdAt">
                    </app-message>
                  </div>

                  <div *ngIf="hasMore" class="py-4 flex justify-center">
                    <button
                      type="button"
                      (click)="handleLoadMore()"
                      class="text-sm text-orange-600 hover:bg-orange-100 px-3 py-1 rounded-lg transition-all duration-300"
                    >
                      <i class="fas fa-chevron-up mr-1"></i> Tải thêm
                    </button>
                  </div>
                </div>
              </ng-template>
            </ng-template>
          </div>
        </div>
      </ng-container>
    </div>

    <!-- Thông báo chưa chọn phòng -->
    <ng-template #noRoom>
      <div class="flex flex-col items-center justify-center h-full p-4">
        <app-empty-card description="Bạn chưa chọn cuộc trò chuyện nào ..."></app-empty-card>
      </div>
    </ng-template>

    <!-- Ô nhập liệu -->
    <ng-container *ngIf="selectedRoomId">
      <form (submit)="handleOnSubmit($event)" class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-300 bg-white z-10">
        <div class="flex items-end space-x-2">
          <textarea
            #inputRef
            [(ngModel)]="inputValue"
            (keydown)="handleKeyDown($event)"
            rows="1"
            name="chatInput"
            class="flex-grow rounded-lg bg-gray-100 focus:outline-none focus:ring-2 focus:ring-orange-500 resize-none p-2 text-sm"
            placeholder="Nhập nội dung tại đây ..."
            maxlength="1000">
          </textarea>
          <button
            type="submit"
            class="bg-orange-600 text-white font-semibold px-6 py-3 rounded-lg h-14 flex items-center gap-1 hover:bg-orange-700 transition-all duration-300"
          >
            <i class="fas fa-paper-plane"></i> Gửi
          </button>
        </div>
      </form>
    </ng-container>
  </ng-container>
</div>
