<div class="p-4 flex flex-col gap-4">
  <!-- Thêm ô tìm kiếm -->
  <div class="relative mb-4">
    <input
      type="text"
      [(ngModel)]="searchText"
      (ngModelChange)="onSearch()"
      placeholder="Tìm kiếm {{ isEmployer ? 'người tìm việc' : 'công ty' }}..."
      class="w-full p-2 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-sm"
    />
    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-orange-500"></i>
  </div>

  <div class="flex flex-col gap-2 overflow-y-auto h-[75vh]">
    <ng-container *ngIf="loading && rooms.length === 0; else loaded">
      <div class="space-y-2">
        <div *ngFor="let _ of [1, 2, 3, 4, 5]" class="flex gap-2 items-center animate-pulse">
          <div class="w-12 h-12 bg-gray-300 rounded-full"></div>
          <div class="flex-1 space-y-2">
            <div class="h-4 bg-gray-300 rounded w-3/4"></div>
            <div class="h-3 bg-gray-300 rounded w-1/2"></div>
          </div>
        </div>
      </div>
    </ng-container>

    <ng-template #loaded>
      <ng-container *ngIf="rooms.length > 0; else noDataTemplate">
        <div class="space-y-1">
          <div
            *ngFor="let room of rooms"
            (click)="navigateToRoom(room)"
            class="flex items-center p-2 bg-white hover:bg-orange-50 rounded cursor-pointer transition-all duration-300"
          >
            <img
              [src]="room.user?.avatarUrl"
              class="w-12 h-12 rounded-full border border-gray-200 object-cover mr-3"
              alt="Avatar"
            />
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-sm text-gray-800 truncate">
                {{ room.user?.name || '---' }}
              </div>
              <div class="text-xs text-gray-600 truncate">
                {{ isEmployer ? (room.user?.email || '---') : (room.user?.company?.companyName || '---') }}
              </div>
            </div>
            <div *ngIf="room.recipientId === currentUser.id && room.unreadCount > 0">
              <i class="fas fa-circle text-orange-600 text-xs"></i>
            </div>
          </div>
          <div *ngIf="hasMore && !loading" class="text-center mt-4">
            <button
              (click)="loadMore()"
              [disabled]="loading"
              class="py-2 px-4 text-sm text-orange-600 hover:text-orange-700 hover:bg-orange-100 rounded-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <i class="fas fa-chevron-down mr-1"></i>Tải thêm
            </button>
          </div>
        </div>
      </ng-container>

      <ng-template #noDataTemplate>
        <div class="text-center py-8 bg-white flex flex-col items-center gap-2">
          <i class="fas fa-comment-slash text-orange-400 text-3xl"></i>
          <p class="font-medium text-gray-700">Không tìm thấy cuộc trò chuyện nào...</p>
        </div>
      </ng-template>
    </ng-template>
  </div>
</div>
