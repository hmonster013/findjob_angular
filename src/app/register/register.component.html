<!-- Container -->
<div class="flex justify-center items-center min-h-screen bg-gray-100 p-4">
  <div class="bg-white bg-opacity-90 backdrop-blur-md rounded-2xl shadow-lg p-8 w-full max-w-md">
    <!-- Avatar Lock Icon -->
    <div class="flex justify-center mb-6">
      <div class="bg-orange-500 p-4 rounded-full shadow-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c1.656 0 3-1.567 3-3.5S13.656 4 12 4s-3 1.567-3 3.5 1.344 3.5 3 3.5zm0 0c1.105 0 2 .672 2 1.5v1H10v-1c0-.828.895-1.5 2-1.5zm0 9c-4.418 0-8-1.79-8-4V14h16v2c0 2.21-3.582 4-8 4z"/>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <h2 class="text-center text-2xl font-bold text-indigo-700 mb-2">Đăng ký tài khoản</h2>
    <p class="text-center text-gray-500 mb-6">Tạo tài khoản ứng viên mới</p>

    <!-- Form -->
    <form class="space-y-4" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên <span class="text-red-500">*</span></label>
        <input type="text" formControlName="fullName" placeholder="Nhập họ và tên của bạn" class="w-full border rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
        <input type="email" formControlName="email" placeholder="Nhập email của bạn" class="w-full border rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu <span class="text-red-500">*</span></label>
        <div class="relative">
          <input type="password" formControlName="password" placeholder="Nhập mật khẩu của bạn" class="w-full border rounded-lg p-2 pr-10 focus:ring-indigo-500 focus:border-indigo-500" />
          <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
            <!-- Icon con mắt -->
            👁️
          </div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu xác nhận <span class="text-red-500">*</span></label>
        <div class="relative">
          <input type="password" formControlName="confirmPassword" placeholder="Nhập lại mật khẩu của bạn" class="w-full border rounded-lg p-2 pr-10 focus:ring-indigo-500 focus:border-indigo-500" />
          <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
            <!-- Icon con mắt -->
            👁️
          </div>
        </div>
      </div>

      <button type="submit" class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-semibold py-2 rounded-lg flex items-center justify-center">
        Đăng ký
      </button>
    </form>

    <!-- OR -->
    <div class="flex items-center my-6">
      <hr class="flex-grow border-t border-gray-300" />
      <span class="px-2 text-gray-500 text-sm">Hoặc đăng ký với</span>
      <hr class="flex-grow border-t border-gray-300" />
    </div>

    <!-- Social login buttons -->
    <div class="flex justify-center space-x-4 mb-4">
      <button class="flex items-center border border-blue-600 text-blue-600 px-4 py-2 rounded-lg w-1/2 justify-center hover:bg-blue-50">
        Facebook
      </button>
      <button class="flex items-center border border-red-500 text-red-500 px-4 py-2 rounded-lg w-1/2 justify-center hover:bg-red-50">
        Google
      </button>
    </div>

    <!-- Link to login -->
    <p class="text-center text-sm text-gray-600">
      Đã có tài khoản? <a href="/dang-nhap" class="text-indigo-600 hover:underline font-medium">Đăng nhập</a>
    </p>
  </div>
</div>
