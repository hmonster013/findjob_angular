<!-- Nếu loading -->
<ng-container *ngIf="isLoading; else jobContent">
  <div class="p-4 border border-gray-100 rounded-xl shadow-sm space-y-3 animate-pulse bg-white">
    <div class="flex gap-3 items-center">
      <div class="w-14 h-14 bg-gray-200 rounded-lg"></div>
      <div class="flex-1 space-y-2">
        <div class="h-5 bg-gray-200 rounded w-2/3"></div>
        <div class="h-4 bg-gray-200 rounded w-1/2"></div>
      </div>
    </div>
    <div class="flex gap-3 mt-3">
      <div class="h-4 bg-gray-200 rounded-full w-20"></div>
      <div class="h-4 bg-gray-200 rounded-full w-20"></div>
      <div class="h-4 bg-gray-200 rounded-full w-20"></div>
    </div>
    <div class="mt-3 h-4 bg-gray-200 rounded w-1/4 ml-auto"></div>
  </div>
</ng-container>

<!-- Nếu có data -->
<ng-template #jobContent>
  <div
    class="p-4 border border-gray-100 rounded-xl shadow-sm hover:shadow-md transition-all cursor-pointer relative bg-white flex flex-col gap-3"
    (click)="navigateToDetail()"
  >
    <!-- Badge HOT -->
    <div
      *ngIf="isHot"
      class="absolute top-3 right-3 bg-red-100 text-red-600 text-xs font-semibold px-2.5 py-1 rounded-full flex items-center gap-1"
    >
      <i class="fas fa-fire text-xs"></i> HOT
    </div>

    <!-- Company Info -->
    <div class="flex items-center gap-3">
      <div class="relative">
        <img
          [src]="companyImageUrl || 'assets/images/companies/company-logo.jpg'"
          alt="Company Logo"
          class="w-14 h-14 border border-gray-100 p-1 rounded-lg object-cover bg-white"
        />
        <div
          *ngIf="isUrgent"
          class="absolute -top-2 -left-2 w-6 h-6 bg-orange-100 text-orange-600 flex items-center justify-center rounded-full animate-pulse"
        >
          <i class="fas fa-bolt text-xs"></i>
        </div>
      </div>

      <div class="flex-1 overflow-hidden">
        <h3 class="font-semibold text-gray-800 text-base truncate hover:text-orange-600 transition-colors">
          {{ jobName }}
        </h3>
        <p class="text-blue-600 text-sm font-medium truncate">{{ companyName }}</p>
      </div>
    </div>

    <!-- Job Details -->
    <div class="flex flex-wrap gap-3 mt-2 text-sm">
      <div class="flex items-center gap-1 bg-gray-100 px-2.5 py-1 rounded-full text-green-600">
        <i class="fas fa-money-bill-wave text-xs"></i>
        {{ salaryString(salaryMin, salaryMax) }}
      </div>
      <div class="flex items-center gap-1 bg-gray-100 px-2.5 py-1 rounded-full text-blue-600">
        <i class="fas fa-map-marker-alt text-xs"></i>
        {{ cityName || 'Chưa cập nhật' }}
      </div>
      <div class="flex items-center gap-1 bg-gray-100 px-2.5 py-1 rounded-full text-gray-600">
        <i class="fas fa-calendar-alt text-xs"></i>
        {{ deadlineFormatted }}
      </div>
    </div>

    <hr class="border-gray-100 my-3" />

    <!-- Deadline -->
    <div class="flex justify-end items-center text-xs text-gray-500 gap-1">
      <i class="fas fa-clock text-gray-600 text-xs"></i>
      Còn {{ daysLeft }} ngày
    </div>
  </div>
</ng-template>
