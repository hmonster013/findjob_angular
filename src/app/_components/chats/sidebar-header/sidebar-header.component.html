<!-- sidebar-header.component.html -->
<div class="px-4 pt-4 pb-2">
  <div class="flex items-center justify-between">
    <!-- Logo -->
    <img src="assets/images/logo-text-dark.png" alt="Logo" class="h-10" />

    <!-- Button -->
    <button
      (click)="handleRedirect()"
      class="flex items-center px-3 py-1.5 bg-gray-100 text-gray-700 rounded-full text-sm hover:bg-gray-200 transition"
    >
      <ng-container *ngIf="isEmployer; else goHome">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12h18M3 6h18M3 18h18"></path>
        </svg>
        Về trang quản trị
      </ng-container>
      <ng-template #goHome>
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
        </svg>
        Về trang chủ
      </ng-template>
    </button>
  </div>

  <hr class="mt-4 border-gray-300" />
</div>
