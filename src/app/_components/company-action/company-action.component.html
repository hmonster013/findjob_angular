<!-- company-action.component.html -->
<div class="w-full" id="company-action">

  <!-- Nếu đang loading -->
  <ng-container *ngIf="isLoading; else normalContent">
    <div class="border rounded-lg shadow p-4 animate-pulse">
      <div class="flex flex-row gap-4">
        <div class="w-20 h-20 bg-gray-300 rounded-lg"></div>
        <div class="flex-1 space-y-3">
          <div class="h-5 bg-gray-300 rounded w-3/4"></div>
          <div class="h-4 bg-gray-300 rounded w-2/4"></div>
          <div class="h-4 bg-gray-300 rounded w-1/3"></div>
        </div>
      </div>
    </div>
  </ng-container>

  <!-- Nếu không loading -->
  <ng-template #normalContent>
    <div class="border rounded-lg shadow hover:shadow-md p-4 transition transform hover:-translate-y-1">
      <div [ngClass]="stackDirection === 'row' ? 'flex flex-row gap-4' : 'flex flex-col gap-4'">

        <!-- Avatar + Info -->
        <div class="flex gap-4 items-center">
          <img
            [src]="company?.companyImageUrl || defaultAvatar"
            alt="Company Logo"
            class="w-20 h-20 rounded-lg object-cover border p-1 bg-white"
          />

          <div class="flex flex-col overflow-hidden flex-1">
            <h3
              class="font-semibold text-blue-600 hover:text-blue-800 cursor-pointer truncate"
              (click)="navigateToCompany()"
            >
              {{ company?.companyName || '---' }}
            </h3>

            <div *ngIf="views && resume" class="text-gray-500 text-sm">
              Đã xem hồ sơ {{ resume?.title }} {{ views }} lần
            </div>

            <div *ngIf="createAt" class="text-gray-500 text-sm">
              Lần xem cuối {{ createAt | date:'dd/MM/yyyy HH:mm' }}
            </div>

            <div *ngIf="followNumber !== undefined" class="text-gray-500 text-sm flex items-center gap-2 mt-1">
              👥 {{ followNumber }} theo dõi
            </div>

            <div *ngIf="jobPostNumber !== undefined" class="text-gray-500 text-sm flex items-center gap-2 mt-1">
              💼 {{ jobPostNumber }} việc làm
            </div>

            <div *ngIf="fieldOperation" class="text-gray-500 text-sm flex items-center gap-2 mt-1">
              🏢 {{ fieldOperation }}
            </div>
          </div>
        </div>

        <!-- Children actions -->
        <div class="flex justify-end items-center flex-1" *ngIf="hasActionSlot">
          <ng-content></ng-content>
        </div>

      </div>
    </div>
  </ng-template>

</div>
