<!-- data-table-custom.component.html -->

<div class="w-full">

  <!-- Nếu đang loading -->
  <div *ngIf="isLoading; else tableContent">
    <div class="space-y-3">
      <div *ngFor="let i of skeletonArray" class="h-10 bg-gray-200 rounded animate-pulse"></div>
    </div>
  </div>

  <!-- Nội dung table -->
  <ng-template #tableContent>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th *ngFor="let head of headCells"
                class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer"
                (click)="handleSort(head.id)">
              <div class="flex items-center gap-1">
                {{ head.label }}
                <span *ngIf="sortField === head.id">
                  <svg *ngIf="sortDirection === 'asc'" class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.293l3.71-4.06a.75.75 0 111.08 1.04l-4.24 4.63a.75.75 0 01-1.08 0l-4.24-4.63a.75.75 0 01.02-1.06z" clip-rule="evenodd"></path>
                  </svg>
                  <svg *ngIf="sortDirection === 'desc'" class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M14.77 12.79a.75.75 0 01-1.06-.02L10 8.707l-3.71 4.06a.75.75 0 11-1.08-1.04l4.24-4.63a.75.75 0 011.08 0l4.24 4.63a.75.75 0 01-.02 1.06z" clip-rule="evenodd"></path>
                  </svg>
                </span>
              </div>
            </th>
          </tr>
        </thead>

        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let row of rows">
            <td *ngFor="let head of headCells" class="px-4 py-2 text-sm text-gray-700 whitespace-nowrap">
              {{ row[head.id] }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="flex justify-center mt-6 space-x-2">
      <button
        *ngFor="let pageNum of [].constructor(totalPages); let idx = index"
        (click)="handlePageChange(idx + 1)"
        [ngClass]="page === (idx + 1) ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 border'"
        class="px-3 py-1 rounded-full text-sm hover:bg-blue-100"
      >
        {{ idx + 1 }}
      </button>
    </div>
  </ng-template>

</div>
