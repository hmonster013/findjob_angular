<div class="p-6 bg-white rounded-lg shadow">
  <div class="flex flex-col items-center gap-6">
    <h2 class="text-2xl font-bold">Tải ứng dụng miễn phí</h2>

    <p class="text-center text-gray-600">
      Tìm việc hiệu quả bằng cách tải MyJob về di động và sẵn sàng nhận việc làm ngay hôm nay!
    </p>

    <form (submit)="handleSendSMS($event)" class="w-full">
      <div class="flex items-center border border-gray-300 rounded-full overflow-hidden">
        <input
          [(ngModel)]="phoneNumber"
          name="phoneNumber"
          type="text"
          placeholder="Nhập số điện thoại"
          class="flex-1 px-4 py-2 focus:outline-none"
        />
        <button
          type="submit"
          class="bg-yellow-500 text-white rounded-full px-5 py-2 mr-2 hover:bg-yellow-600 transition"
        >
          gửi đi
        </button>
      </div>
    </form>

    <div class="flex gap-4 mt-2">
      <a [href]="chPlayLink" target="_blank">
        <img src="assets/images/chplay.png" alt="CH Play" class="h-12 w-auto" />
      </a>
      <a [href]="appStoreLink" target="_blank">
        <img src="assets/images/appstore.png" alt="App Store" class="h-12 w-auto" />
      </a>
    </div>
  </div>

  <!-- Full screen loading overlay -->
  <div *ngIf="isLoading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="text-white text-xl font-semibold">Loading...</div>
  </div>
</div>
