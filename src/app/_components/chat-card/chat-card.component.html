<button
  (click)="handleRedirect()"
  class="relative p-2 rounded-full hover:bg-gray-100 transition"
  aria-label="show new notifications"
>
  <svg
    class="w-6 h-6 text-gray-700"
    fill="none"
    stroke="currentColor"
    viewBox="0 0 24 24"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
      d="M8 10h.01M12 10h.01M16 10h.01M21 16V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2z" />
  </svg>

  <span
    *ngIf="unreadCount > 0"
    class="absolute top-0 right-0 inline-flex items-center justify-center w-5 h-5 text-xs font-bold text-white bg-red-600 rounded-full"
  >
    {{ unreadCount }}
  </span>
</button>
