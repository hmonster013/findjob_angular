<!-- dropzone-dialog-custom.component.html -->
<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
  <div class="bg-white rounded-lg w-full max-w-md p-6 space-y-6">

    <!-- Title + Close -->
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-bold">{{ title }}</h2>
      <button (click)="handleClose()" class="text-red-500 hover:text-red-700 text-2xl">&times;</button>
    </div>

    <!-- Dropzone -->
    <label
      class="flex flex-col items-center justify-center border-2 border-dashed border-gray-400 rounded-lg p-6 cursor-pointer hover:border-blue-400 transition"
      (dragover)="onDragOver($event)"
      (drop)="onDrop($event)"
    >
      <input type="file" hidden (change)="onFileSelected($event)" accept="image/*" multiple />
      <p class="text-gray-600">Kéo và thả tệp vào đây hoặc nhấp để chọn</p>
    </label>

    <!-- Preview -->
    <div *ngIf="previewUrls.length > 0" class="flex flex-wrap gap-4">
      <div *ngFor="let url of previewUrls" class="w-24 h-24 overflow-hidden rounded border">
        <img [src]="url" alt="Preview" class="w-full h-full object-cover" />
      </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-3 pt-4">
      <button (click)="handleClose()" class="px-4 py-2 text-sm bg-gray-300 hover:bg-gray-400 rounded">Hủy</button>
      <button (click)="handleUpload()" class="px-4 py-2 text-sm bg-blue-500 text-white hover:bg-blue-600 rounded">
        Tải lên
      </button>
    </div>

  </div>
</div>
