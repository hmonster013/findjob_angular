<!-- profile-upload-card.component.html -->

<div
  class="relative h-[310px] bg-white overflow-hidden rounded-2xl shadow transition-transform hover:-translate-y-1 hover:shadow-lg cursor-pointer"
>
  <!-- Ảnh nền -->
  <img
    [src]="resumeImage"
    alt="Background"
    class="absolute top-0 left-0 w-full h-full object-cover z-10"
  />

  <!-- Gradient Overlay -->
  <div class="absolute top-0 left-0 w-full h-full z-20 bg-gradient-to-b from-transparent via-gray-800/80 to-gray-900/95"></div>

  <!-- Nội dung bên trong -->
  <div class="absolute bottom-0 left-0 right-0 p-4 z-30 text-white flex flex-col gap-4">

    <!-- Status Active -->
    <div class="flex justify-end">
      <button
        (click)="handleActive(slug)"
        [ngClass]="isActive ? 'bg-green-600' : 'bg-gray-600'"
        class="flex items-center gap-2 px-3 py-1 rounded-full text-xs font-medium backdrop-blur-sm"
      >
        <ng-container *ngIf="isActive; else notActive">
          ⭐ Cho phép tìm kiếm
        </ng-container>
        <ng-template #notActive>☆ Cho phép tìm kiếm</ng-template>
      </button>

      <div class="ml-2 relative group">
        <div class="text-gray-400 text-lg">❓</div>
        <div
          class="absolute bottom-full mb-2 hidden group-hover:block bg-black text-white text-xs rounded p-2 w-60 text-center"
        >
          Bật "Cho phép tìm kiếm" sẽ giúp nhà tuyển dụng tìm thấy hồ sơ của bạn. Chỉ một hồ sơ được bật cùng lúc.
        </div>
      </div>
    </div>

    <!-- Title + Edit -->
    <div class="flex justify-between items-center">
      <h3 class="font-semibold text-lg truncate">{{ title }}</h3>

      <button (click)="editProfile()"
        class="p-2 rounded-full backdrop-blur-sm bg-white/10 hover:bg-white/20 transition">
        ✏️
      </button>
    </div>

    <!-- UpdatedAt -->
    <p class="text-xs opacity-80">
      Cập nhật lần cuối: {{ updateAt | date: 'dd/MM/yyyy HH:mm:ss' }}
    </p>

    <!-- Download + Delete -->
    <div class="flex justify-between items-center">
      <button
        (click)="downloadFile()"
        class="flex items-center gap-2 px-3 py-1 rounded-full text-xs font-medium backdrop-blur-sm bg-white/20 hover:bg-white/30"
      >
        📥 Tải xuống
      </button>

      <button
        (click)="handleDelete(slug)"
        class="p-2 rounded-full backdrop-blur-sm bg-red-600/20 hover:bg-red-600/30 transition"
      >
        🗑️
      </button>
    </div>
  </div>
</div>

<!-- Loading Skeleton -->
<ng-template #loadingTemplate>
  <div class="p-4 space-y-3 animate-pulse">
    <div class="h-6 bg-gray-300 rounded"></div>
    <div class="flex gap-2">
      <div class="h-6 w-6 bg-gray-300 rounded-full"></div>
      <div class="flex-1 h-4 bg-gray-300 rounded"></div>
    </div>
    <div class="h-20 bg-gray-300 rounded"></div>
    <div class="h-4 bg-gray-300 rounded"></div>
    <div class="h-4 bg-gray-300 rounded"></div>
  </div>
</ng-template>
