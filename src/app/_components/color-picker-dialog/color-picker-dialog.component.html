<!-- color-picker-dialog.component.html -->
<div
  *ngIf="open"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
>
  <div class="bg-white rounded-lg w-full max-w-xs p-4 space-y-4">
    <h2 class="text-lg font-bold text-center">Chọn màu sắc cho CV của bạn</h2>

    <div>
      <p class="text-sm mb-2 font-medium">Màu sắc gợi ý</p>
      <div class="flex flex-wrap justify-center gap-2">
        <div
          *ngFor="let color of defaultColors"
          (click)="handleColorSelect(color)"
          [ngClass]="selectedColor === color ? 'ring-2 ring-blue-500' : ''"
          class="w-10 h-10 rounded cursor-pointer"
          [style.backgroundColor]="color"
        ></div>
        <div
          (click)="toggleCustomPicker()"
          [ngClass]="showCustomPicker ? 'ring-2 ring-blue-500' : ''"
          class="w-10 h-10 rounded cursor-pointer bg-gradient-to-r from-red-500 via-green-500 to-blue-500"
        ></div>
      </div>
    </div>

    <div *ngIf="showCustomPicker" class="flex justify-center">
      <input
        type="color"
        [value]="selectedColor"
        (input)="handleCustomColorChange($event)"
        class="w-32 h-10 p-0 border-none"
      />
    </div>

    <div class="bg-gray-100 rounded p-2">
      <p class="text-sm mb-1">Xem trước màu đã chọn</p>
      <div
        class="w-full h-12 rounded"
        [style.backgroundColor]="selectedColor"
      ></div>
    </div>

    <div class="flex justify-end space-x-3">
      <button
        (click)="onClose()"
        class="px-4 py-2 bg-gray-300 hover:bg-gray-400 rounded text-sm"
      >
        Hủy
      </button>
      <button
        (click)="handleConfirm()"
        class="px-4 py-2 rounded text-white text-sm"
        [style.backgroundColor]="selectedColor"
      >
        Xác nhận
      </button>
    </div>
  </div>
</div>
