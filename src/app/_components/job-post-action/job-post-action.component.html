<!-- job-post-action.component.html -->

<div id="job-post-action" class="w-full">
  <div *ngIf="isLoading; else jobContent" class="p-4 border rounded-lg shadow animate-pulse space-y-4">
    <div class="flex gap-4 items-center">
      <div class="w-16 h-16 bg-gray-300 rounded"></div>
      <div class="flex-1 space-y-2">
        <div class="h-5 bg-gray-300 rounded w-2/3"></div>
        <div class="h-4 bg-gray-300 rounded w-1/2"></div>
      </div>
    </div>
    <div class="flex flex-wrap gap-2 mt-4">
      <div class="w-24 h-5 bg-gray-300 rounded"></div>
      <div class="w-24 h-5 bg-gray-300 rounded"></div>
      <div class="w-24 h-5 bg-gray-300 rounded"></div>
    </div>
    <div class="flex justify-end">
      <div class="w-24 h-9 bg-gray-300 rounded"></div>
    </div>
  </div>

  <ng-template #jobContent>
    <div
      class="p-4 border rounded-lg shadow hover:shadow-md transition flex flex-col gap-4"
      [ngClass]="stackDirection === 'row' ? 'sm:flex-row' : 'flex-col'"
    >
      <!-- Left Side -->
      <div [ngClass]="stackDirection === 'row' ? 'w-2/3' : 'w-full'">
        <div class="flex gap-4">
          <div class="flex justify-center">
            <img
              [src]="companyImageUrl"
              alt="Company Logo"
              class="w-16 h-16 object-cover border rounded-lg bg-white p-1"
            />
          </div>
          <div class="flex-1 overflow-hidden flex flex-col justify-between">
            <div>
              <h3
                class="text-blue-600 font-semibold text-base truncate hover:underline cursor-pointer"
                (click)="navigateToDetail()"
              >
                {{ jobName }}
              </h3>
              <p class="text-gray-500 text-sm truncate">{{ companyName }}</p>
            </div>

            <div class="flex flex-wrap gap-4 mt-2 text-gray-600 text-sm">
              <div class="flex items-center gap-1">
                💰 {{ salaryStringFn(salaryMin, salaryMax) }}
              </div>
              <div class="flex items-center gap-1">
                📍 {{ cityName || 'Chưa cập nhật' }}
              </div>
              <div class="flex items-center gap-1">
                📅 {{ formatDeadline }}
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Side -->
      <div class="flex justify-end items-center flex-1">
        <ng-content></ng-content>
      </div>
    </div>
  </ng-template>
</div>
