<!-- job-post-large.component.html -->

<div class="border rounded-lg p-4 shadow hover:shadow-md transition relative bg-white cursor-pointer" (click)="navigateToDetail()">

  <!-- Nếu Loading -->
  <ng-container *ngIf="isLoading; else jobContent">
    <div class="flex gap-4">
      <div class="w-24 h-24 bg-gray-300 rounded-lg animate-pulse"></div>
      <div class="flex-1 space-y-3">
        <div class="h-6 bg-gray-300 rounded animate-pulse w-2/3"></div>
        <div class="h-4 bg-gray-300 rounded animate-pulse w-1/2"></div>
        <div class="h-4 bg-gray-300 rounded animate-pulse w-1/3"></div>
      </div>
    </div>
  </ng-container>

  <!-- Nội dung thực -->
  <ng-template #jobContent>
    <div class="flex gap-4">

      <!-- Logo -->
      <div class="relative">
        <img [src]="companyImageUrl" alt="Company Logo" class="w-24 h-24 rounded-lg border p-2 bg-white object-cover" />

        <!-- Tuyển gấp -->
        <div *ngIf="isUrgent" class="absolute -top-2 -right-2 bg-yellow-400 w-7 h-7 flex items-center justify-center rounded-full shadow animate-pulse">
          ⚡
        </div>
      </div>

      <!-- Job info -->
      <div class="flex-1 flex flex-col justify-between overflow-hidden">

        <div>
          <h3 class="text-lg font-bold text-gray-800 truncate">{{ jobName }}</h3>
          <p class="text-sm text-blue-600 font-semibold truncate">{{ companyName }}</p>
        </div>

        <!-- Tags -->
        <div class="flex flex-wrap gap-2 mt-2 text-sm">
          <div class="flex items-center gap-1 bg-blue-50 px-2 py-1 rounded-full text-blue-600">
            💰 {{ salaryStringFn(salaryMin, salaryMax) }}
          </div>
          <div class="flex items-center gap-1 bg-green-50 px-2 py-1 rounded-full text-green-600">
            📍 {{ cityName || 'Chưa cập nhật' }}
          </div>
          <div class="flex items-center gap-1 bg-purple-50 px-2 py-1 rounded-full text-purple-600">
            📅 {{ deadlineFormatted }}
          </div>
        </div>

        <!-- Badge HOT -->
        <div *ngIf="isHot" class="absolute top-2 right-2 bg-red-100 text-red-600 text-xs font-semibold px-3 py-1 rounded-full flex items-center gap-1 shadow animate-pulse">
          🔥 HOT
        </div>

      </div>
    </div>

    <hr class="border-gray-200 my-3" />

    <!-- Countdown -->
    <div class="flex justify-end text-gray-500 text-sm gap-1">
      ⏰ Còn {{ daysLeft }} ngày
    </div>

  </ng-template>
</div>
