<!-- number-card.component.html -->

<div
  class="border rounded-lg p-4 flex flex-col gap-2"
  [ngStyle]="{ 'border-color': color, 'background-color': backgroundColor }"
>
  <div class="p-2">
    <h3 [ngStyle]="{ color: color }" class="font-bold text-3xl">
      {{ number }}
    </h3>
  </div>
  <div>
    <span class="text-sm font-semibold text-gray-600">
      {{ description }}
    </span>
  </div>
</div>
