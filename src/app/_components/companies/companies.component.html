<!-- companies.component.html -->

<!-- Header -->
<div class="flex flex-col sm:flex-row justify-between items-center mb-6">
  <div class="flex items-center gap-2">
    <h2 class="text-2xl font-bold">Công ty nổi bật</h2>
    <span class="text-blue-600 bg-blue-100 px-3 py-1 rounded-full text-sm">
      {{ count }} công ty
    </span>
  </div>
</div>

<!-- Nội dung -->
<div *ngIf="isLoading; else dataContent">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let i of skeletonArray" class="h-60 border rounded-lg p-4 animate-pulse bg-gray-100"></div>
  </div>
</div>

<ng-template #dataContent>
  <ng-container *ngIf="companies.length > 0; else noData">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <app-company
        *ngFor="let company of companies"
        [slug]="company.slug"
        [companyImageUrl]="company.companyImageUrl"
        [companyCoverImageUrl]="company.companyCoverImageUrl"
        [companyName]="company.companyName"
        [employeeSize]="company.employeeSize"
        [fieldOperation]="company.fieldOperation"
        [city]="company.locationDict?.city"
        [followNumber]="company.followNumber"
        [jobPostNumber]="company.jobPostNumber"
        [isFollowed]="company.isFollowed"
      ></app-company>
    </div>

    <!-- Pagination -->
    <div *ngIf="totalPages > 1" class="flex justify-center mt-6">
      <nav class="inline-flex rounded-md shadow-sm" aria-label="Pagination">
        <!-- Previous Button -->
        <button
          (click)="changePage(page - 1)"
          [disabled]="page === 1"
          class="px-3 py-2 border border-gray-300 rounded-l-md text-gray-500 hover:bg-purple-800 hover:text-white disabled:text-gray-400 disabled:hover:bg-white disabled:hover:text-gray-400"
        >
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </button>

        <!-- Page Numbers -->
        <button
          *ngFor="let p of getVisiblePages()"
          (click)="changePage(p)"
          class="px-4 py-2 border-t border-b border-gray-300 text-gray-700 hover:bg-purple-800 hover:text-white"
          [class.bg-purple-800]="p === page"
          [class.text-white]="p === page"
        >
          {{ p }}
        </button>

        <!-- Next Button -->
        <button
          (click)="changePage(page + 1)"
          [disabled]="page === totalPages"
          class="px-3 py-2 border border-gray-300 rounded-r-md text-gray-500 hover:bg-purple-800 hover:text-white disabled:text-gray-400 disabled:hover:bg-white disabled:hover:text-gray-400"
        >
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </nav>
    </div>
  </ng-container>

  <ng-template #noData>
    <app-no-data-card
      [title]="'Hiện chưa tìm công ty phù hợp với tiêu chí của bạn'"
      [imgComponentSvg]="'/assets/images/no-data.svg'"
    ></app-no-data-card>
  </ng-template>
</ng-template>
