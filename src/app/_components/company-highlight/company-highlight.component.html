<div class="w-full p-6 bg-gray-50 rounded-2xl">
  <h2 class="text-2xl font-bold mb-6">Các công ty nổi bật</h2>

  <swiper-container
    slides-per-view="5"
    space-between="15"
    pagination="true"
    autoplay-delay="2500"
    autoplay-disable-on-interaction="false"
    class="!pb-20"
  >
    <ng-container *ngIf="isLoading">
      <swiper-slide *ngFor="let item of [1,2,3,4,5,6,7,8]">
        <div class="bg-white p-4 rounded-xl shadow-md animate-pulse flex flex-col items-center gap-3">
          <div class="w-16 h-16 bg-gray-300 rounded-lg"></div>
          <div class="w-24 h-4 bg-gray-300 rounded"></div>
          <div class="w-20 h-3 bg-gray-200 rounded"></div>
        </div>
      </swiper-slide>
    </ng-container>

    <ng-container *ngIf="!isLoading">
      <swiper-slide *ngFor="let career of topCareers">
        <div class="bg-white p-4 rounded-xl shadow-md hover:shadow-lg transition transform hover:-translate-y-1 cursor-pointer flex flex-col items-center gap-2">
          <div class="w-16 h-16 bg-gray-100 flex items-center justify-center rounded-lg">
            <img *ngIf="career.iconUrl; else noImage" [src]="career.iconUrl" alt="Logo" class="w-full h-full object-cover rounded-lg">
            <ng-template #noImage>
              <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7l6 6-6 6M21 7l-6 6 6 6"></path>
              </svg>
            </ng-template>
          </div>
          <h3 class="text-center text-sm font-semibold truncate w-full">{{ career.name }}</h3>
        </div>
      </swiper-slide>
    </ng-container>
  </swiper-container>
</div>
