<!-- Nếu loading -->
<ng-container *ngIf="isLoading; else normalContent">
  <div class="p-4 border rounded-lg shadow space-y-4 animate-pulse">
    <div class="w-full h-40 bg-gray-300 rounded-lg"></div>
    <div class="flex gap-4 items-center -mt-10">
      <div class="w-20 h-20 bg-gray-300 rounded-md"></div>
      <div class="flex-1 space-y-2">
        <div class="h-4 bg-gray-300 rounded w-2/3"></div>
      </div>
    </div>
    <div class="space-y-3 mt-4">
      <div class="h-4 bg-gray-300 rounded"></div>
      <div class="h-4 bg-gray-300 rounded"></div>
      <div class="h-4 bg-gray-300 rounded"></div>
      <div class="h-4 bg-gray-300 rounded"></div>
    </div>
    <div class="h-8 bg-gray-300 rounded-full mt-4"></div>
  </div>
</ng-container>

<!-- Nếu có dữ liệu -->
<ng-template #normalContent>
  <div class="p-4 border rounded-lg shadow hover:shadow-md transition flex flex-col justify-between h-full">
    <!-- Cover + Logo -->
    <div class="relative">
      <img
        [src]="companyCoverImageUrl || defaultCoverImage"
        alt="Cover"
        class="w-full h-40 object-cover rounded-lg brightness-90"
      />

      <a
        [routerLink]="['/company', slug]"
        class="absolute -bottom-8 left-4 w-20 h-20 rounded-lg bg-white p-1 shadow-md hover:scale-105 transition transform"
      >
        <img
          [src]="companyImageUrl"
          alt="Company Logo"
          class="w-full h-full object-cover rounded-md"
        />
      </a>

      <div
        class="absolute top-2 right-2 bg-white bg-opacity-90 px-2 py-1 rounded-md text-xs font-semibold text-gray-700"
      >
        👥 {{ followNumber || 0 }} lượt theo dõi
      </div>
    </div>

    <!-- Info -->
    <div class="pt-10 px-2 flex-1 flex flex-col">
      <a
        [routerLink]="['/cong-ty', slug]"
        class="font-semibold text-lg hover:text-blue-600 transition mb-2 truncate"
      >
        {{ companyName.length > 55 ? (companyName | slice:0:55) + '...' : companyName }}
      </a>

      <div class="space-y-2 text-gray-600 text-sm">
        <div class="flex items-center gap-2">
          🎨 {{ fieldOperation || 'Chưa cập nhật' }}
        </div>
        <div class="flex items-center gap-2">
          📍 {{ cityName || 'Chưa cập nhật' }}
        </div>
        <div class="flex items-center gap-2">
          🧑‍💼 {{ employeeSizeName || 'Chưa cập nhật' }}
        </div>
        <div class="flex items-center gap-2 text-blue-600 font-semibold">
          💼 {{ jobPostNumber || 0 }} việc làm
        </div>
      </div>
    </div>

    <!-- Follow button -->
    <div class="mt-4" *ngIf="isJobSeeker">
      <button
        (click)="handleFollow()"
        class="w-full px-4 py-2 rounded-full text-sm font-medium"
        [ngClass]="followed ? 'bg-yellow-500 text-white' : 'border border-yellow-500 text-yellow-500'"
      >
        {{ loadingFollow ? 'Đang xử lý...' : (followed ? 'Đang theo dõi' : 'Theo dõi') }}
      </button>
    </div>
  </div>
</ng-template>
