<div class="flex justify-center py-16 bg-gray-100 min-h-screen">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h2 class="text-center text-xl font-semibold mb-2">Quên mật khẩu</h2>
    <p class="text-center text-gray-600 text-sm mb-6">
      Nếu tài khoản tồn tại, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu qua email cho bạn.
    </p>

    <form>
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Email <span class="text-red-500">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-violet-600 focus:outline-none"
          placeholder="Nhập email"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-violet-700 hover:bg-violet-800 text-white py-2 rounded-md font-semibold transition duration-200"
      >
        Đặt lại mật khẩu
      </button>
    </form>
  </div>
</div>
