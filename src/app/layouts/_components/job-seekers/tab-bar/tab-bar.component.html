<!-- tab-bar.component.html -->
<nav class="w-full min-w-[1280px] bg-gray-50 px-5 pt-2">
  <div class="flex overflow-x-auto gap-2 no-scrollbar">
    <a
      *ngFor="let tab of tabItems"
      [routerLink]="tab.path"
      routerLinkActive="bg-blue-100 text-blue-600 font-bold border-b-2 border-blue-600 shadow-sm"
      [routerLinkActiveOptions]="{ exact: tab.id === 1 }"
      class="flex items-center whitespace-nowrap px-3 py-2 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-all duration-300 ease-in-out"
    >
      <!-- Font Awesome icons (assuming Font Awesome is available) -->
      <i class="fa fa-{{tab.icon}} mr-2"></i>
      {{ tab.label }}
    </a>
  </div>
</nav>
