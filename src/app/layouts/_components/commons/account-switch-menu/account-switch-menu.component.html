<!-- account-switch-menu.component.html -->

<div>
  <div *ngIf="isShowButton; else titleOnly" class="flex flex-col gap-2 w-40">
    <button
      class="border border-gray-300 text-gray-700 py-2 rounded hover:bg-gray-100 text-sm"
      (click)="handleClickAuth(true)"
    >
      {{ hostname === HOST_NAME.EMPLOYER_MYJOB ? 'Đăng nhập ứng viên' : 'Đăng nhập NTD' }}
    </button>
    <button
      class="border border-gray-300 text-gray-700 py-2 rounded hover:bg-gray-100 text-sm"
      (click)="handleClickAuth(false)"
    >
      {{ hostname === HOST_NAME.EMPLOYER_MYJOB ? 'Đăng ký ứng viên' : 'Đăng ký NTD' }}
    </button>
  </div>

  <ng-template #titleOnly>
    <div class="flex items-center cursor-pointer" (click)="handleClick()">
      <div class="text-blue-500 text-2xl mr-2">
        <!-- Icon -->
        <span *ngIf="hostname === HOST_NAME.MYJOB">💼</span>
        <span *ngIf="hostname === HOST_NAME.EMPLOYER_MYJOB">👥</span>
      </div>
      <div class="flex flex-col text-white">
        <span class="font-semibold text-sm">
          {{ hostname === HOST_NAME.MYJOB ? 'Nhà tuyển dụng' : 'Người tìm việc' }}
        </span>
        <span class="text-xs">
          {{ hostname === HOST_NAME.MYJOB ? 'Đăng tin miễn phí' : 'Chuyển trang' }}
        </span>
      </div>
    </div>
  </ng-template>
</div>
