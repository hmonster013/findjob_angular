<div
  class="absolute right-0 mt-2 w-56 bg-white rounded-md shadow-xl ring-1 ring-black ring-opacity-5 focus:outline-none z-45 transition ease-out duration-100 transform opacity-100 scale-100"
>
  <div class="py-1">
    <ng-container *ngFor="let item of menuItems">
      <a
        [routerLink]="['/', item.path]"
        class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-primary"
        (click)="closeMenu()"
      >
        {{ item.label }}
      </a>
    </ng-container>

    <button
      class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-gray-100"
      (click)="handleLogout()"
    >
      <span class="mr-2">🚪</span>Đăng xuất
    </button>
  </div>
</div>
