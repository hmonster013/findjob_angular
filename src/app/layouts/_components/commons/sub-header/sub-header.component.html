<!-- sub-header.component.html -->

<div class="w-full border-b bg-white shadow-sm">
  <div class="container mx-auto flex items-center py-2 gap-2">

    <!-- Button mở Dialog -->
    <div
      class="w-10 h-10 flex items-center justify-center rounded-lg cursor-pointer hover:bg-gray-100 transition-all"
      (click)="toggleDialog(true)"
    >
      <!-- Icon thay thế -->
      <span class="text-xl">📋</span>
    </div>

    <!-- List Top Careers -->
    <div class="flex overflow-x-auto gap-2">
      <div
        *ngFor="let career of topCareers"
        (click)="handleFilter(career.id)"
        class="flex-shrink-0 cursor-pointer whitespace-nowrap font-semibold text-gray-700 px-3 py-1 rounded-full hover:bg-gray-100 transition-all"
      >
        {{ career.name }}
      </div>
    </div>

  </div>

  <!-- SubHeader Dialog -->
  <app-sub-header-dialog
    [open]="open"
    [topCareers]="topCareers"
    [allCareers]="topCareers"
    (close)="toggleDialog(false)"
    (selectCareer)="handleFilter($event)"
  ></app-sub-header-dialog>
</div>
