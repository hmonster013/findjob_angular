<header
  class="fixed top-0 z-50 bg-blue-600 text-white shadow-lg flex items-center justify-between h-16 w-full lg:w-[calc(100%-240px)]"
>
  <!-- Left side: Menu toggle + Logo -->
  <div class="flex items-center h-full px-3 sm:px-4 gap-2 sm:gap-3">
    <button
      class="lg:hidden p-2 rounded-full bg-blue-700 hover:bg-blue-800 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
      (click)="handleDrawerToggle?.()"
      aria-label="Mở sidebar"
    >
      <i class="fas fa-bars text-lg"></i>
    </button>
    <a href="/" class="flex items-center">
      <span class="text-sm font-semibold hidden sm:block">MyJob</span>
    </a>
  </div>

  <!-- Right side: Notifications + Chat + Avatar -->
  <div class="flex items-center h-full px-3 sm:px-4 gap-2 sm:gap-3">
    <!-- NotificationCard -->
    <app-notification-card
      *ngIf="isAuthenticated"
      class="flex-shrink-0"
      (closed)="closeMenus()"
    ></app-notification-card>

    <!-- ChatCard (ẩn trên mobile) -->
    <app-chat-card
      *ngIf="isAuthenticated && !isMobile"
      class="flex-shrink-0"
    ></app-chat-card>

    <!-- Avatar + UserMenu -->
    <div *ngIf="isAuthenticated" class="relative">
      <div
        class="flex items-center gap-2 border border-white rounded-full p-1 cursor-pointer hover:bg-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
        (click)="toggleUserMenu()"
        [attr.aria-expanded]="showUserMenu"
        aria-controls="user-menu"
        role="button"
      >
        <img
          [src]="currentUser?.avatarUrl || '/assets/images/avatar-default.png'"
          alt="Avatar của {{ currentUser?.fullName || 'người dùng' }}"
          class="w-8 h-8 lg:w-9 lg:h-9 rounded-full object-cover"
          loading="lazy"
        />
        <span class="hidden lg:block text-sm font-medium truncate max-w-[120px]">
          {{ currentUser?.fullName || 'Người dùng' }}
        </span>
      </div>

      <div
        *ngIf="showUserMenu"
        id="user-menu"
        class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl z-50 max-w-[calc(100vw-16px)]"
      >
        <app-user-menu (closed)="closeMenus()"></app-user-menu>
      </div>
    </div>
  </div>
</header>
