<!-- Container -->
<div class="flex flex-col items-center min-h-screen bg-gray-100 p-4">
  <h2 class="text-2xl font-semibold text-gray-800 mt-10 mb-2">Xác nhận email</h2>
  <p class="text-gray-600 mb-8">Cảm ơn bạn đã đăng ký tài khoản MyJob</p>

  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md text-center">
    <!-- Icon Email -->
    <div class="flex justify-center mb-6">
      <div class="bg-orange-100 p-4 rounded-full">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12H8m8 0H8m4-8h.01M12 4a8 8 0 11-8 8 8 8 0 018-8z" />
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h3 class="text-xl font-semibold text-gray-800 mb-2">Xác nhận địa chỉ email của bạn</h3>

    <p class="text-gray-600 mb-1">
      Email xác nhận đã được gửi đến:
    </p>
    <p class="text-indigo-600 font-medium mb-4">
      {{ email }}
    </p>

    <p class="text-sm text-gray-500 mb-6">
      Nhấp vào liên kết trong email để kích hoạt tài khoản của bạn
    </p>

    <!-- Resend -->
    <p class="text-sm text-gray-500">
      Không nhận được email?
      <button (click)="resendVerificationEmail()" class="text-red-500 font-medium hover:underline">
        Gửi lại email
      </button>
    </p>
  </div>
</div>
