<main class="min-h-[75vh] bg-[#f8f8f8] flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <!-- Lock Icon -->
    <div class="flex justify-center mb-4">
      <div class="bg-orange-100 p-4 rounded-full text-orange-500">
        <i class="fa fa-lock fa-2x"></i>
      </div>
    </div>

    <!-- Title -->
    <h2 class="text-center text-2xl font-bold text-[#441DA0]">Đăng nhập</h2>
    <p class="text-center text-gray-600 mt-1 mb-6">Chào mừng bạn trở lại</p>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email -->
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium mb-1">Email <span class="text-red-500">*</span></label>
        <input id="email" type="email" formControlName="email" placeholder="Nhập email của bạn"
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#441DA0]">
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label for="password" class="block text-sm font-medium mb-1">Mật khẩu <span class="text-red-500">*</span></label>
        <div class="relative">
          <input id="password" type="password" formControlName="password" placeholder="Nhập mật khẩu của bạn"
            class="w-full border border-gray-300 rounded-md px-3 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-[#441DA0]">
          <button type="button" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500">
            <i class="fa fa-eye"></i>
          </button>
        </div>
      </div>

      <!-- Login button -->
      <button type="submit"
        class="w-full bg-[#441DA0] text-white py-2 rounded-md hover:bg-[#3a168e] transition font-semibold text-sm">
        <i class="fa fa-sign-in-alt mr-1"></i> Đăng nhập
      </button>
    </form>

    <!-- Social Login Divider -->
    <div class="flex items-center my-4">
      <div class="flex-grow border-t border-gray-300"></div>
      <span class="mx-2 text-gray-500 text-sm">Hoặc đăng nhập với</span>
      <div class="flex-grow border-t border-gray-300"></div>
    </div>

    <!-- Social Buttons -->
    <div class="flex space-x-2 mb-4">
      <button class="flex items-center justify-center border border-gray-300 rounded-md w-1/2 py-2 text-sm text-blue-600 hover:bg-blue-50">
        <i class="fab fa-facebook-f mr-2"></i> Facebook
      </button>
      <button class="flex items-center justify-center border border-gray-300 rounded-md w-1/2 py-2 text-sm text-red-600 hover:bg-red-50">
        <i class="fab fa-google mr-2"></i> Google
      </button>
    </div>

    <!-- Footer Links -->
    <div class="flex justify-between text-sm text-[#441DA0]">
      <a href="#" class="hover:underline">Quên mật khẩu?</a>
      <a href="#" class="hover:underline">Chưa có tài khoản? Đăng ký</a>
    </div>
  </div>
</main>
