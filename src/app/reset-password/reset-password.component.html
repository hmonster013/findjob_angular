<div class="flex justify-center mt-10 mb-20">
  <div class="bg-white shadow-xl rounded-xl w-full max-w-xl p-8">
    <h2 class="text-center text-lg font-semibold text-gray-800">Đặt lại mật khẩu của bạn</h2>

    <form class="space-y-4 mt-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu mới <span class="text-red-500">*</span></label>
        <div class="relative">
          <input type="password" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="Nhập mật khẩu mới" />
          <button type="button" class="absolute right-3 top-2.5 text-gray-500 hover:text-gray-700">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu xác nhận <span class="text-red-500">*</span></label>
        <div class="relative">
          <input type="password" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="Nhập lại mật khẩu mới" />
          <button type="button" class="absolute right-3 top-2.5 text-gray-500 hover:text-gray-700">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold py-2 rounded-md mt-2 transition">
        Đặt lại mật khẩu
      </button>
    </form>
  </div>
</div>
